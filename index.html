function renderBorder(app, params) {
  var page = el('div', 'page');
  page.appendChild(makePageTitle([{ text: 'Mijn ' }, { text: 'Border', em: true }]));

  // View mode state
  var viewMode = Store.get('settings').borderView || 'table';

  // View toggle
  var toggle = el('div', 'view-toggle');
  var btnTable = el('button', 'view-toggle-btn' + (viewMode === 'table' ? ' active' : ''), 'Tabel');
  var btnCards = el('button', 'view-toggle-btn' + (viewMode === 'cards' ? ' active' : ''), 'Kaarten');
  btnTable.addEventListener('click', function() {
    Store.setSetting('borderView', 'table');
    Router.handleRoute();
  });
  btnCards.addEventListener('click', function() {
    Store.setSetting('borderView', 'cards');
    Router.handleRoute();
  });
  toggle.appendChild(btnTable);
  toggle.appendChild(btnCards);
  page.appendChild(toggle);

  // Get selected plants
  var selected = Store.getSelected();
  if (selected.length === 0) {
    var empty = el('div', '', 'Geen planten geselecteerd. Ga naar de catalogus om planten toe te voegen.');
    empty.style.cssText = 'padding:40px 0;text-align:center;color:var(--ink-40);font-size:14px';
    page.appendChild(empty);
    app.appendChild(page);
    return;
  }

  // Group by category
  var groups = {};
  var catOrder = Object.keys(CAT_TARGETS);
  catOrder.push('');

  // Sort alphabetically
  selected.sort(function(a, b) {
    var na = a.plant.species + (a.plant.variant || '');
    var nb = b.plant.species + (b.plant.variant || '');
    return na.localeCompare(nb);
  });

  selected.forEach(function(item) {
    var cat = item.selection.category || '';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  });

  // Render each category group
  catOrder.forEach(function(cat) {
    if (!groups[cat] || groups[cat].length === 0) return;
    var items = groups[cat];

    // Calculate group stats
    var groupQty = 0, groupCost = 0;
    items.forEach(function(item) {
      groupQty += item.selection.qty || 0;
      var price = getPrice(item.plant, item.selection.supplier);
      groupCost += price * (item.selection.qty || 0);
    });

    var catLabel = cat || 'Niet toegewezen';
    var target = CAT_TARGETS[cat];

    // Group header
    var header = el('div', 'group-header');
    var titleSpan = el('span', 'group-title', catLabel.charAt(0).toUpperCase() + catLabel.slice(1));
    header.appendChild(titleSpan);

    if (target) {
      var badge = el('span');
      badge.style.cssText = 'font-size:11px;padding:2px 8px;border-radius:10px;color:#fff';
      var catColors = {
        'grassen': 'var(--cat-grassen)', 'cool season': 'var(--cat-cool)',
        'warm season A': 'var(--cat-warm-a)', 'warm season B': 'var(--cat-warm-b)',
        'asters/chrystanten': 'var(--cat-asters)', 'extra': 'var(--cat-extra)'
      };
      badge.style.background = catColors[cat] || 'var(--ink-40)';
      badge.textContent = groupQty + '/' + target;
      header.appendChild(badge);
    }

    var countSpan = el('span', 'group-count', formatEuro(groupCost));
    header.appendChild(countSpan);
    page.appendChild(header);

    if (viewMode === 'table') {
      renderBorderTable(page, items);
    } else {
      renderBorderCards(page, items);
    }

    // Store reference for live updates
    if (badge) badge.setAttribute('data-cat', cat);
    countSpan.setAttribute('data-cat-cost', cat);
  });

  // Subscribe to Store for live header updates
  Store.subscribe(function() {
    if (!document.contains(page)) return;
    var selected = Store.getSelected();
    var catQty = {}, catCost = {};
    Object.keys(CAT_TARGETS).forEach(function(c) { catQty[c] = 0; catCost[c] = 0; });
    catQty[''] = 0; catCost[''] = 0;
    selected.forEach(function(item) {
      var c = item.selection.category || '';
      catQty[c] = (catQty[c] || 0) + (item.selection.qty || 0);
      var price = getPrice(item.plant, item.selection.supplier);
      catCost[c] = (catCost[c] || 0) + price * (item.selection.qty || 0);
    });
    page.querySelectorAll('[data-cat]').forEach(function(b) {
      var c = b.getAttribute('data-cat');
      var t = CAT_TARGETS[c];
      if (t) b.textContent = (catQty[c] || 0) + '/' + t;
    });
    page.querySelectorAll('[data-cat-cost]').forEach(function(s) {
      var c = s.getAttribute('data-cat-cost');
      s.textContent = formatEuro(catCost[c] || 0);
    });
  });

  app.appendChild(page);
}

function renderBorderTable(container, items) {
  // Sort items by sortOrder
  items.sort(function(a, b) {
    var oa = (a.selection.sortOrder != null) ? a.selection.sortOrder : 9999;
    var ob = (b.selection.sortOrder != null) ? b.selection.sortOrder : 9999;
    return oa - ob;
  });

  // Header row — add extra column for expand arrow
  var headerRow = el('div', 'border-row');
  headerRow.style.cssText = 'font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink-40);border-bottom:1px solid var(--border);grid-template-columns:28px 44px 1fr 100px 100px 80px 65px 65px 28px';
  var cols = ['', '', 'Plant', 'Status', 'Aantal', 'Lever.', 'Prijs', 'Totaal', ''];
  cols.forEach(function(c) {
    headerRow.appendChild(el('div', '', c));
  });
  container.appendChild(headerRow);

  // Drag state shared across rows
  var dragState = { dragId: null };

  items.forEach(function(item, idx) {
    var row = el('div', 'border-row');
    row.style.gridTemplateColumns = '28px 44px 1fr 100px 100px 80px 65px 65px 28px';
    row.setAttribute('data-plant-id', item.id);
    row.setAttribute('draggable', 'true');

    // Drag events
    row.addEventListener('dragstart', function(e) {
      dragState.dragId = item.id;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', item.id);
    });
    row.addEventListener('dragend', function() {
      row.classList.remove('dragging');
      dragState.dragId = null;
      container.querySelectorAll('.border-row.drag-over').forEach(function(r) { r.classList.remove('drag-over'); });
    });
    row.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragState.dragId && dragState.dragId !== item.id) {
        row.classList.add('drag-over');
      }
    });
    row.addEventListener('dragleave', function() {
      row.classList.remove('drag-over');
    });
    row.addEventListener('drop', function(e) {
      e.preventDefault();
      row.classList.remove('drag-over');
      var fromId = dragState.dragId;
      if (!fromId || fromId === item.id) return;
      // Reorder: assign sortOrder values based on new positions
      var ids = items.map(function(it) { return it.id; });
      var fromIdx = ids.indexOf(fromId);
      var toIdx = ids.indexOf(item.id);
      if (fromIdx === -1 || toIdx === -1) return;
      ids.splice(fromIdx, 1);
      ids.splice(toIdx, 0, fromId);
      ids.forEach(function(id, i) { Store.setSortOrder(id, i); });
      Router.handleRoute();
    });

    // Expand arrow cell
    var expandCell = el('div', 'row-expand-arrow');
    expandCell.textContent = '\u25BE';
    expandCell.title = 'Details';
    var detailPanel = null;
    expandCell.addEventListener('click', function() {
      if (detailPanel) {
        detailPanel.remove();
        detailPanel = null;
        expandCell.classList.remove('open');
      } else {
        expandCell.classList.add('open');
        detailPanel = buildDetailPanel(item);
        row.parentNode.insertBefore(detailPanel, row.nextSibling);
      }
    });
    row.appendChild(expandCell);

    // Thumbnail
    row.appendChild(makeThumbnail(item.plant));

    // Name + category dropdown
    var nameCell = el('div', 'row-name');
    var sp = el('span', 'row-species', item.plant.species);
    nameCell.appendChild(sp);
    if (item.plant.variant) {
      nameCell.appendChild(document.createElement('br'));
      var vr = el('span', 'row-variant', '\u2018' + item.plant.variant + '\u2019');
      nameCell.appendChild(vr);
    }
    // Category dropdown
    var catSelect = el('select', 'row-supplier');
    catSelect.style.cssText = 'display:block;margin-top:4px;font-size:10px;padding:2px 4px';
    var catOpts = [{ val: '', label: '-- categorie --' }];
    Object.keys(CAT_TARGETS).forEach(function(c) {
      catOpts.push({ val: c, label: c.charAt(0).toUpperCase() + c.slice(1) });
    });
    catOpts.forEach(function(opt) {
      var o = el('option', '', opt.label);
      o.value = opt.val;
      if (opt.val === (item.selection.category || '')) o.selected = true;
      catSelect.appendChild(o);
    });
    catSelect.addEventListener('change', (function(id) {
      return function() { Store.setCategory(id, this.value); };
    })(item.id));
    nameCell.appendChild(catSelect);
    row.appendChild(nameCell);

    // Status dropdown
    var statusCell = el('div');
    var statusSelect = el('select', 'row-supplier');
    var statuses = [
      { val: 'must-have', label: '\u2726 must-have' },
      { val: 'variant-flex', label: '\u25C7 variant-flex' },
      { val: 'alternatief', label: '\u25CB alternatief' }
    ];
    statuses.forEach(function(s) {
      var o = el('option', '', s.label);
      o.value = s.val;
      if (s.val === item.selection.status) o.selected = true;
      statusSelect.appendChild(o);
    });
    var pillColors = {
      'must-have': 'background:var(--moss-10);color:var(--moss)',
      'variant-flex': 'background:var(--copper-10);color:var(--copper)',
      'alternatief': 'background:rgba(25,118,210,0.1);color:#1976d2'
    };
    statusSelect.style.cssText = 'border-radius:12px;font-size:10px;font-weight:500;padding:3px 10px;border:none;cursor:pointer;' + (pillColors[item.selection.status] || '');
    statusSelect.addEventListener('change', (function(id, selEl) {
      return function() {
        Store.setStatus(id, this.value);
        selEl.style.cssText = 'border-radius:12px;font-size:10px;font-weight:500;padding:3px 10px;border:none;cursor:pointer;' + (pillColors[this.value] || '');
      };
    })(item.id, statusSelect));
    statusCell.appendChild(statusSelect);
    row.appendChild(statusCell);

    // Qty stepper — update in-place
    var qtyCell = el('div');
    var stepper = el('div', 'row-stepper');
    var minBtn = el('button', 'row-stepper-btn', '\u2212');
    var qtyVal = el('span', 'row-stepper-val', String(item.selection.qty));
    var plusBtn = el('button', 'row-stepper-btn', '+');
    var priceCell = el('div', 'row-price');
    var totalCell = el('div', 'row-total');

    function updateRowPrice(id) {
      var sel = Store.getSelection(id);
      if (!sel) { row.remove(); return; }
      var p = CATALOG_BY_ID[id];
      var price = getPrice(p, sel.supplier);
      priceCell.textContent = formatEuro(price);
      totalCell.textContent = formatEuro(price * sel.qty);
      qtyVal.textContent = sel.qty;
    }

    minBtn.addEventListener('click', (function(id) {
      return function() {
        var sel = Store.getSelection(id);
        if (sel && sel.qty > 1) { Store.setQty(id, sel.qty - 1); updateRowPrice(id); }
        else { Store.togglePlant(id); row.remove(); }
      };
    })(item.id));
    plusBtn.addEventListener('click', (function(id) {
      return function() {
        var sel = Store.getSelection(id);
        Store.setQty(id, (sel ? sel.qty : 0) + 1);
        updateRowPrice(id);
      };
    })(item.id));
    stepper.appendChild(minBtn);
    stepper.appendChild(qtyVal);
    stepper.appendChild(plusBtn);
    qtyCell.appendChild(stepper);
    row.appendChild(qtyCell);

    // Supplier dropdown — update price in-place
    var supCell = el('div');
    var supSelect = el('select', 'row-supplier');
    var supOpts = [];
    if (item.plant.nr) supOpts.push('NR');
    if (item.plant.va) supOpts.push('VA');
    supOpts.push('Anders');
    supOpts.forEach(function(s) {
      var o = el('option', '', s);
      o.value = s;
      if (s === item.selection.supplier) o.selected = true;
      supSelect.appendChild(o);
    });
    supSelect.addEventListener('change', (function(id) {
      return function() {
        Store.setSupplier(id, this.value);
        updateRowPrice(id);
      };
    })(item.id));
    supCell.appendChild(supSelect);
    row.appendChild(supCell);

    // Unit price
    var price = getPrice(item.plant, item.selection.supplier);
    priceCell.textContent = formatEuro(price);
    row.appendChild(priceCell);

    // Line total
    totalCell.textContent = formatEuro(price * (item.selection.qty || 0));
    row.appendChild(totalCell);

    // Remove button
    var removeCell = el('div', 'row-expand');
    removeCell.textContent = '\u2715';
    removeCell.title = 'Verwijderen';
    removeCell.style.cursor = 'pointer';
    removeCell.addEventListener('click', (function(id) {
      return function() { Store.togglePlant(id); row.remove(); };
    })(item.id));
    row.appendChild(removeCell);

    container.appendChild(row);
  });
}

function buildDetailPanel(item) {
  var panel = el('div', 'border-detail-panel');

  // === Alternatives section ===
  var altSection = el('div', 'detail-section');
  altSection.appendChild(el('div', 'detail-label', 'Alternatieven'));

  // Current alternatives as pills
  var altPills = el('div', 'alt-pills');
  var currentAlts = (item.selection.alternatives || []).slice();

  function renderAltPills() {
    altPills.textContent = '';
    currentAlts.forEach(function(altId) {
      var altPlant = CATALOG_BY_ID[altId];
      if (!altPlant) return;
      var pill = el('span', 'alt-pill');
      var label = altPlant.species;
      if (altPlant.variant) label += ' \u2018' + altPlant.variant + '\u2019';
      pill.appendChild(document.createTextNode(label));
      var removeBtn = el('span', 'alt-pill-remove', '\u2715');
      removeBtn.addEventListener('click', function() {
        currentAlts = currentAlts.filter(function(id) { return id !== altId; });
        Store.setAlternatives(item.id, currentAlts);
        renderAltPills();
      });
      pill.appendChild(removeBtn);
      altPills.appendChild(pill);
    });
  }
  renderAltPills();
  altSection.appendChild(altPills);

  // Search input for alternatives
  var altSearchWrap = el('div');
  altSearchWrap.style.position = 'relative';
  altSearchWrap.style.marginTop = '6px';
  var altInput = el('input', 'alt-search');
  altInput.type = 'text';
  altInput.placeholder = 'Zoek alternatief uit hetzelfde genus...';
  altSearchWrap.appendChild(altInput);

  var altDropdown = el('div', 'alt-dropdown');
  altDropdown.style.display = 'none';
  altSearchWrap.appendChild(altDropdown);

  // Find same-genus plants
  var sameGenus = CATALOG.filter(function(p) {
    return p.genus === item.plant.genus && p.id !== item.id;
  });

  altInput.addEventListener('input', function() {
    var q = altInput.value.toLowerCase();
    altDropdown.textContent = '';
    if (!q) { altDropdown.style.display = 'none'; return; }
    var matches = sameGenus.filter(function(p) {
      if (currentAlts.indexOf(p.id) !== -1) return false;
      var hay = (p.species + ' ' + (p.variant || '')).toLowerCase();
      return hay.indexOf(q) !== -1;
    }).slice(0, 8);
    if (matches.length === 0) { altDropdown.style.display = 'none'; return; }
    altDropdown.style.display = 'block';
    matches.forEach(function(p) {
      var opt = el('div', 'alt-dropdown-item');
      var lbl = p.species;
      if (p.variant) lbl += ' \u2018' + p.variant + '\u2019';
      opt.textContent = lbl;
      opt.addEventListener('click', function() {
        currentAlts.push(p.id);
        Store.setAlternatives(item.id, currentAlts);
        altInput.value = '';
        altDropdown.style.display = 'none';
        renderAltPills();
      });
      altDropdown.appendChild(opt);
    });
  });

  altInput.addEventListener('focus', function() {
    if (altInput.value) altInput.dispatchEvent(new Event('input'));
  });

  // Close dropdown on outside click
  document.addEventListener('click', function closeAlt(e) {
    if (!altSearchWrap.contains(e.target)) {
      altDropdown.style.display = 'none';
    }
  });

  altSection.appendChild(altSearchWrap);
  panel.appendChild(altSection);

  // === Notes section ===
  var notesSection = el('div', 'detail-section');
  notesSection.appendChild(el('div', 'detail-label', 'Notities'));
  var textarea = el('textarea', 'plant-notes');
  textarea.value = item.selection.notes || '';
  textarea.placeholder = 'Notities over deze plant...';
  var notesTimer = null;
  textarea.addEventListener('input', function() {
    clearTimeout(notesTimer);
    notesTimer = setTimeout(function() {
      Store.setNotes(item.id, textarea.value);
    }, 400);
  });
  notesSection.appendChild(textarea);
  panel.appendChild(notesSection);

  return panel;
}

function renderBorderCards(container, items) {
  var grid = el('div', 'card-grid');

  items.forEach(function(item) {
    var card = el('div', 'plant-card selected');

    // Image
    var imgWrap = el('div', 'card-img');
    if (item.plant.images && item.plant.images.length) {
      var img = el('img', 'card-img-gradient');
      img.src = item.plant.images[0];
      img.alt = item.plant.species;
      img.loading = 'lazy';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover';
      img.onerror = function() {
        this.style.display = 'none';
        var grad = el('div', 'card-img-gradient');
        grad.style.background = getThumbColor(item.plant);
        imgWrap.appendChild(grad);
      };
      imgWrap.appendChild(img);
    } else {
      var grad = el('div', 'card-img-gradient');
      grad.style.background = getThumbColor(item.plant);
      imgWrap.appendChild(grad);
    }
    card.appendChild(imgWrap);

    // Body
    var body = el('div', 'card-body');
    body.appendChild(el('div', 'card-species', item.plant.species));
    if (item.plant.variant) {
      body.appendChild(el('div', 'card-variant', '\u2018' + item.plant.variant + '\u2019'));
    }

    // Status pill
    var pillClass = item.selection.status || 'must-have';
    var pill = el('span', 'status-pill ' + pillClass, makeStatusIcon(pillClass) + ' ' + pillClass);
    pill.style.marginBottom = '8px';
    body.appendChild(pill);

    // Category dropdown
    var catSelect = el('select', 'row-supplier');
    catSelect.style.cssText = 'margin-bottom:8px;font-size:11px';
    var catOpts = [{ val: '', label: '-- categorie --' }];
    Object.keys(CAT_TARGETS).forEach(function(c) {
      catOpts.push({ val: c, label: c.charAt(0).toUpperCase() + c.slice(1) });
    });
    catOpts.forEach(function(opt) {
      var o = el('option', '', opt.label);
      o.value = opt.val;
      if (opt.val === (item.selection.category || '')) o.selected = true;
      catSelect.appendChild(o);
    });
    catSelect.addEventListener('change', (function(id) {
      return function() { Store.setCategory(id, this.value); };
    })(item.id));
    body.appendChild(catSelect);

    // Qty stepper — in-place update
    var stepper = el('div', 'qty-stepper');
    var minBtn = el('button', 'qty-btn', '\u2212');
    var qtyVal = el('span', 'qty-val', String(item.selection.qty));
    var plusBtn = el('button', 'qty-btn', '+');
    var priceAmt = el('span', 'supplier-price');
    var totalAmt = el('span', 'supplier-price');
    totalAmt.style.fontWeight = '700';

    function updateCardPrice(id) {
      var sel = Store.getSelection(id);
      if (!sel) { card.remove(); return; }
      var p = CATALOG_BY_ID[id];
      var pr = getPrice(p, sel.supplier);
      priceAmt.textContent = formatEuro(pr);
      totalAmt.textContent = formatEuro(pr * sel.qty);
      qtyVal.textContent = sel.qty;
    }

    minBtn.addEventListener('click', (function(id) {
      return function() {
        var sel = Store.getSelection(id);
        if (sel && sel.qty > 1) { Store.setQty(id, sel.qty - 1); updateCardPrice(id); }
        else { Store.togglePlant(id); card.remove(); }
      };
    })(item.id));
    plusBtn.addEventListener('click', (function(id) {
      return function() {
        var sel = Store.getSelection(id);
        Store.setQty(id, (sel ? sel.qty : 0) + 1);
        updateCardPrice(id);
      };
    })(item.id));
    stepper.appendChild(minBtn);
    stepper.appendChild(qtyVal);
    stepper.appendChild(plusBtn);
    body.appendChild(stepper);

    // Price info
    var price = getPrice(item.plant, item.selection.supplier);
    var footer = el('div', 'card-footer');
    var supRow = el('div', 'supplier-row');
    supRow.appendChild(el('span', 'supplier-name', item.selection.supplier || '?'));
    priceAmt.textContent = formatEuro(price);
    supRow.appendChild(priceAmt);
    footer.appendChild(supRow);
    var totalRow = el('div', 'supplier-row');
    totalRow.appendChild(el('span', 'supplier-name', 'Totaal'));
    totalAmt.textContent = formatEuro(price * (item.selection.qty || 0));
    totalRow.appendChild(totalAmt);
    footer.appendChild(totalRow);
    body.appendChild(footer);

    card.appendChild(body);

    // Remove button (top-right)
    var removeBtn = el('button', 'card-add');
    removeBtn.textContent = '\u2715';
    removeBtn.title = 'Verwijderen';
    removeBtn.style.cssText = 'background:rgba(255,0,0,0.1);color:#d32f2f;border-color:#d32f2f';
    removeBtn.addEventListener('click', (function(id) {
      return function() { Store.togglePlant(id); card.remove(); };
    })(item.id));
    card.appendChild(removeBtn);

    grid.appendChild(card);
  });

  container.appendChild(grid);
}

function renderOrder(app, params) {
  var page = el('div', 'page');
  page.appendChild(makePageTitle([{ text: 'Bestelling', em: true }]));

  var selected = Store.getSelected();
  var totals = Store.getTotals();

  // Sort alphabetically
  selected.sort(function(a, b) {
    var na = a.plant.species + (a.plant.variant || '');
    var nb = b.plant.species + (b.plant.variant || '');
    return na.localeCompare(nb);
  });

  // Split by supplier
  var nrPlants = [], vaPlants = [], otherPlants = [];
  selected.forEach(function(item) {
    if (item.selection.supplier === 'NR') nrPlants.push(item);
    else if (item.selection.supplier === 'VA') vaPlants.push(item);
    else otherPlants.push(item);
  });

  // Natu-Ral section
  if (nrPlants.length > 0) {
    page.appendChild(buildOrderSection('Natu-Ral', nrPlants, 'NR'));
  }

  // Van Asselberghs section
  if (vaPlants.length > 0) {
    page.appendChild(buildOrderSection('Van Asselberghs', vaPlants, 'VA'));
  }

  // Other / unassigned
  if (otherPlants.length > 0) {
    page.appendChild(buildOrderSection('Overig / Niet toegewezen', otherPlants, ''));
  }

  // Custom plants section
  page.appendChild(buildCustomPlantsSection());

  // Grand total bar
  var customPlants = Store.get('customPlants') || [];
  var customTotal = 0;
  customPlants.forEach(function(cp) { customTotal += (cp.qty || 0) * (cp.price || 0); });
  var grandTotal = totals.totalCost + customTotal;
  var grandQty = totals.totalQty;
  customPlants.forEach(function(cp) { grandQty += (cp.qty || 0); });

  var totalBar = el('div', 'order-total-bar');
  totalBar.appendChild(el('span', 'order-total-label', 'Totaal \u2014 ' + grandQty + ' planten'));
  totalBar.appendChild(el('span', 'order-total-amount', formatEuro(grandTotal)));
  page.appendChild(totalBar);

  // Action buttons
  var actions = el('div', 'order-actions');

  var printBtn = el('button', 'btn primary', '\uD83D\uDDA8 Print bestelling');
  printBtn.addEventListener('click', function() { window.print(); });
  actions.appendChild(printBtn);

  var copyBtn = el('button', 'btn', '\uD83D\uDCCB Kopieer als tekst');
  copyBtn.addEventListener('click', function() {
    var text = buildOrderText(nrPlants, vaPlants, otherPlants, customPlants, grandTotal, grandQty);
    navigator.clipboard.writeText(text).then(function() {
      copyBtn.textContent = '\u2713 Gekopieerd!';
      setTimeout(function() { copyBtn.textContent = '\uD83D\uDCCB Kopieer als tekst'; }, 2000);
    });
  });
  actions.appendChild(copyBtn);

  app.appendChild(page);

  // Add print styles if not already present
  if (!document.getElementById('print-styles')) {
    var style = document.createElement('style');
    style.id = 'print-styles';
    style.textContent = '@media print { .nav { display: none !important; } .order-actions { display: none !important; } .order-total-bar { break-before: avoid; } body::after { display: none !important; } .page { padding: 0 !important; } }';
    document.head.appendChild(style);
  }
}

function buildOrderSection(titleText, items, supplierKey) {
  var section = el('div', 'order-section');

  var head = el('div', 'order-section-head');
  head.appendChild(el('span', 'order-section-title', titleText));

  var sectionQty = 0, sectionCost = 0;
  items.forEach(function(item) {
    var qty = item.selection.qty || 0;
    sectionQty += qty;
    sectionCost += getPrice(item.plant, item.selection.supplier) * qty;
  });
  head.appendChild(el('span', 'order-section-sub', sectionQty + ' planten \u00B7 ' + formatEuro(sectionCost)));
  section.appendChild(head);

  // Progress bar: purchased vs total
  var purchasedQty = 0;
  items.forEach(function(item) { if (item.selection.purchased) purchasedQty += item.selection.qty || 0; });
  var progressWrap = el('div');
  progressWrap.style.cssText = 'margin:12px 0 16px;display:flex;align-items:center;gap:10px';
  var progBar = el('div');
  progBar.style.cssText = 'flex:1;height:6px;background:var(--ink-10);border-radius:3px;overflow:hidden';
  var progFill = el('div');
  var progPct = sectionQty > 0 ? (purchasedQty / sectionQty * 100) : 0;
  progFill.style.cssText = 'height:100%;border-radius:3px;transition:width 0.3s;background:var(--moss)';
  progFill.style.width = progPct + '%';
  progBar.appendChild(progFill);
  progressWrap.appendChild(progBar);
  var progLabel = el('span');
  progLabel.style.cssText = 'font-size:11px;color:var(--ink-40);white-space:nowrap;font-variant-numeric:tabular-nums';
  progLabel.textContent = purchasedQty + '/' + sectionQty + ' bevestigd';
  progressWrap.appendChild(progLabel);
  section.appendChild(progressWrap);

  // Table
  var table = el('table', 'order-table');
  var thead = el('thead');
  var headerRow = el('tr');
  ['\u2713', 'Plant', 'Code', 'Aantal', 'Status', 'Prijs'].forEach(function(h) {
    headerRow.appendChild(el('th', '', h));
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  var tbody = el('tbody');
  items.forEach(function(item) {
    var tr = el('tr');
    if (item.selection.purchased) tr.style.opacity = '0.5';

    // Checkbox
    var checkTd = el('td');
    var checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = !!item.selection.purchased;
    checkbox.style.cssText = 'width:16px;height:16px;cursor:pointer;accent-color:var(--moss)';
    checkbox.addEventListener('change', (function(id, row) {
      return function() {
        Store.setPurchased(id, this.checked);
        row.style.opacity = this.checked ? '0.5' : '1';
        row.style.textDecoration = this.checked ? 'line-through' : 'none';
        // Update progress
        var newPurchased = 0;
        items.forEach(function(it) { if (Store.getSelection(it.id) && Store.getSelection(it.id).purchased) newPurchased += Store.getSelection(it.id).qty || 0; });
        var newPct = sectionQty > 0 ? (newPurchased / sectionQty * 100) : 0;
        progFill.style.width = newPct + '%';
        progLabel.textContent = newPurchased + '/' + sectionQty + ' bevestigd';
      };
    })(item.id, tr));
    checkTd.appendChild(checkbox);
    tr.appendChild(checkTd);

    // Plant name
    var nameTd = el('td');
    var nameSpan = el('span', 'plant-name');
    nameSpan.textContent = item.plant.species + ' ';
    if (item.plant.variant) {
      var varSpan = el('span', 'plant-variant', '\u2018' + item.plant.variant + '\u2019');
      nameSpan.appendChild(varSpan);
    }
    nameTd.appendChild(nameSpan);
    tr.appendChild(nameTd);

    // Code
    var codeTd = el('td');
    if (supplierKey === 'NR' && item.plant.code) {
      codeTd.textContent = item.plant.code;
    } else {
      codeTd.textContent = '\u2014';
    }
    tr.appendChild(codeTd);

    // Qty stepper
    var qtyTd = el('td');
    var orderStepper = el('div', 'row-stepper');
    orderStepper.style.cssText = 'display:inline-flex';
    var oMin = el('button', 'row-stepper-btn', '\u2212');
    var oVal = el('span', 'row-stepper-val', String(item.selection.qty));
    var oPlus = el('button', 'row-stepper-btn', '+');
    var priceTdRef = el('td');
    oMin.addEventListener('click', (function(id, valEl, prTd, row) {
      return function() {
        var s = Store.getSelection(id);
        if (!s) return;
        if (s.qty > 1) {
          Store.setQty(id, s.qty - 1);
          valEl.textContent = s.qty;
          var p = CATALOG_BY_ID[id];
          var pr = getPrice(p, s.supplier);
          prTd.textContent = formatEuro(pr * s.qty);
        } else {
          Store.togglePlant(id);
          row.remove();
        }
      };
    })(item.id, oVal, priceTdRef, tr));
    oPlus.addEventListener('click', (function(id, valEl, prTd) {
      return function() {
        var s = Store.getSelection(id);
        if (!s) return;
        Store.setQty(id, s.qty + 1);
        valEl.textContent = s.qty;
        var p = CATALOG_BY_ID[id];
        var pr = getPrice(p, s.supplier);
        prTd.textContent = formatEuro(pr * s.qty);
      };
    })(item.id, oVal, priceTdRef));
    orderStepper.appendChild(oMin);
    orderStepper.appendChild(oVal);
    orderStepper.appendChild(oPlus);
    qtyTd.appendChild(orderStepper);
    tr.appendChild(qtyTd);

    // Status icon
    var statusTd = el('td');
    var pillClass = item.selection.status || 'must-have';
    var statusPill = el('span', 'status-pill ' + pillClass, makeStatusIcon(pillClass));
    statusTd.appendChild(statusPill);
    tr.appendChild(statusTd);

    // Line total (linked to priceTdRef for stepper updates)
    var price = getPrice(item.plant, item.selection.supplier);
    var lineTotal = price * (item.selection.qty || 0);
    priceTdRef.textContent = formatEuro(lineTotal);
    tr.appendChild(priceTdRef);

    if (item.selection.purchased) {
      tr.style.textDecoration = 'line-through';
    }

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  section.appendChild(table);

  return section;
}

function buildCustomPlantsSection() {
  var section = el('div', 'order-section');
  var head = el('div', 'order-section-head');
  head.appendChild(el('span', 'order-section-title', 'Handmatig toegevoegd'));
  section.appendChild(head);

  var customPlants = Store.get('customPlants') || [];

  // Render existing custom plants
  if (customPlants.length > 0) {
    var table = el('table', 'order-table');
    var thead = el('thead');
    var headerRow = el('tr');
    ['Plant', 'Aantal', 'Prijs', 'Totaal', ''].forEach(function(h) {
      headerRow.appendChild(el('th', '', h));
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    var tbody = el('tbody');
    customPlants.forEach(function(cp, idx) {
      var tr = el('tr');
      tr.appendChild(el('td', '', cp.name || ''));
      tr.appendChild(el('td', '', String(cp.qty || 0)));
      tr.appendChild(el('td', '', formatEuro(cp.price || 0)));
      tr.appendChild(el('td', '', formatEuro((cp.qty || 0) * (cp.price || 0))));

      var delTd = el('td');
      var delBtn = el('button', 'btn', '\u2715');
      delBtn.style.cssText = 'padding:4px 8px;font-size:11px;color:#d32f2f';
      delBtn.addEventListener('click', (function(index) {
        return function() {
          var cp2 = Store.get('customPlants') || [];
          cp2.splice(index, 1);
          Store._state.customPlants = cp2;
          Store._persist();
          Router.handleRoute();
        };
      })(idx));
      delTd.appendChild(delBtn);
      tr.appendChild(delTd);

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    section.appendChild(table);
  }

  // Add form (hidden by default, shown on click)
  var formWrap = el('div');
  formWrap.style.display = 'none';

  var form = el('div');
  form.style.cssText = 'display:flex;gap:8px;align-items:flex-end;padding:12px 0';

  var nameField = createFormField('Naam', 'text');
  var qtyField = createFormField('Aantal', 'number');
  qtyField.querySelector('input').value = '1';
  qtyField.querySelector('input').min = '1';
  var priceField = createFormField('Prijs (\u20AC)', 'number');
  priceField.querySelector('input').step = '0.01';
  priceField.querySelector('input').min = '0';

  var addBtn = el('button', 'btn primary', 'Toevoegen');
  addBtn.style.marginBottom = '0';
  addBtn.addEventListener('click', function() {
    var name = nameField.querySelector('input').value.trim();
    var qty = parseInt(qtyField.querySelector('input').value, 10) || 1;
    var price = parseFloat(priceField.querySelector('input').value) || 0;
    if (!name) return;
    var cp = Store.get('customPlants') || [];
    cp.push({ name: name, qty: qty, price: price });
    Store._state.customPlants = cp;
    Store._persist();
    Router.handleRoute();
  });

  form.appendChild(nameField);
  form.appendChild(qtyField);
  form.appendChild(priceField);
  form.appendChild(addBtn);
  formWrap.appendChild(form);
  section.appendChild(formWrap);

  // Toggle button
  var addArea = el('div', 'custom-add', '+ Plant toevoegen (niet in catalogus)');
  addArea.addEventListener('click', function() {
    if (formWrap.style.display === 'none') {
      formWrap.style.display = 'block';
      addArea.style.display = 'none';
    }
  });
  section.appendChild(addArea);

  return section;
}

function createFormField(label, type) {
  var wrap = el('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px';
  var lbl = el('label', '', label);
  lbl.style.cssText = 'font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink-40)';
  var input = el('input');
  input.type = type;
  input.style.cssText = 'padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:12px;background:var(--card);color:var(--ink);outline:none;width:120px';
  if (type === 'number') input.style.width = '80px';
  wrap.appendChild(lbl);
  wrap.appendChild(input);
  return wrap;
}

function buildOrderText(nrPlants, vaPlants, otherPlants, customPlants, grandTotal, grandQty) {
  var lines = [];
  lines.push('PRAIRIEBORDER BESTELLING');
  lines.push('========================\n');

  if (nrPlants.length) {
    lines.push('NATU-RAL');
    lines.push('--------');
    nrPlants.forEach(function(item) {
      var price = getPrice(item.plant, 'NR');
      var name = item.plant.species + (item.plant.variant ? ' \'' + item.plant.variant + '\'' : '');
      lines.push(item.selection.qty + 'x  ' + name + '  [' + (item.plant.code || '') + ']  ' + formatEuro(price * item.selection.qty));
    });
    var nrTotal = 0;
    nrPlants.forEach(function(item) { nrTotal += getPrice(item.plant, 'NR') * item.selection.qty; });
    lines.push('Subtotaal: ' + formatEuro(nrTotal) + '\n');
  }

  if (vaPlants.length) {
    lines.push('VAN ASSELBERGHS');
    lines.push('----------------');
    vaPlants.forEach(function(item) {
      var price = getPrice(item.plant, 'VA');
      var name = item.plant.species + (item.plant.variant ? ' \'' + item.plant.variant + '\'' : '');
      lines.push(item.selection.qty + 'x  ' + name + '  ' + formatEuro(price * item.selection.qty));
    });
    var vaTotal = 0;
    vaPlants.forEach(function(item) { vaTotal += getPrice(item.plant, 'VA') * item.selection.qty; });
    lines.push('Subtotaal: ' + formatEuro(vaTotal) + '\n');
  }

  if (otherPlants.length) {
    lines.push('OVERIG');
    lines.push('------');
    otherPlants.forEach(function(item) {
      var name = item.plant.species + (item.plant.variant ? ' \'' + item.plant.variant + '\'' : '');
      lines.push(item.selection.qty + 'x  ' + name);
    });
    lines.push('');
  }

  if (customPlants.length) {
    lines.push('HANDMATIG TOEGEVOEGD');
    lines.push('--------------------');
    customPlants.forEach(function(cp) {
      lines.push(cp.qty + 'x  ' + cp.name + '  ' + formatEuro(cp.price * cp.qty));
    });
    lines.push('');
  }

  lines.push('========================');
  lines.push('TOTAAL: ' + grandQty + ' planten \u2014 ' + formatEuro(grandTotal));

  return lines.join('\n');
}

  'Persicaria': { common: 'duizendknoop', type: 'prairie', desc: 'Essentieel Oudolf-genus. P. amplexicaulis biedt maandenlange poker-achtige bloemen van juli tot november. Niets anders dekt zo\'n lang seizoen. Weeft prachtig door de border.', light: ['zon', 'hs'] },
  'Nepeta': { common: 'kattenkruid', type: 'prairie', desc: 'Onmisbaar als randplant met lavendelblauwe bloemaren. Extreem lang bloeiend bij terugsnoeien. Aromatisch blad. Perfecte partner voor rozen en siergrassen.', light: ['zon'] },
  'Geranium': { common: 'ooievaarsbek', type: 'prairie', desc: 'Veelzijdige bodembedekker met fijn blad en lange bloei. G. \'Rozanne\' bloeit van juni tot november. Vulplant bij uitstek die onkruid onderdrukt.', light: ['zon', 'hs'] },
  'Actaea': { common: 'christoffelkruid', type: 'prairie', desc: 'Elegante herfstbloeier met flessenborstelarige bloemen en donker blad. A. simplex \'Brunette\' biedt dramatisch contrast. Parfumeert de herfsttuin.', light: ['hs', 'schaduw'] },

  // Shade genera
  'Astrantia': { common: 'zeeuws knoopje', type: 'shade', desc: 'Subtiele speldenkussenbloemen van mei tot oktober. Essentieel voor halfschaduw-zones. Fijne textuur die contrast biedt met grote bladvormers. A. major \'Roma\' en \'Moulin Rouge\' zijn Oudolf-favorieten.', light: ['hs', 'schaduw'] },
  'Brunnera': { common: 'vergeet-me-nietje', type: 'shade', desc: 'Prachtig zilveren bladwerk met blauwe voorjaarsbloemen. B. \'Jack Frost\' is een klassieker voor schaduw. Uitstekende bodembedekker die ook in de winter decoratief blijft.', light: ['hs', 'schaduw'] },
  'Campanula': { common: 'klokje', type: 'shade', desc: 'Charmante klokbloemen in blauw, wit en paars. C. lactiflora en C. persicifolia zijn uitstekend voor halfschaduw. Lange bloeiperiode en zaait zichzelf subtiel uit.', light: ['hs', 'schaduw'] },
  'Digitalis': { common: 'vingerhoedskruid', type: 'shade', desc: 'Dramatische verticale bloemtorens tot 150cm. D. purpurea en D. ferruginea bieden architecturaal accent in schaduwrijke borders. Kortstondig maar zaait overvloedig uit.', light: ['hs', 'schaduw'] },
  'Epimedium': { common: 'elfenbloem', type: 'shade', desc: 'Onverslijtbare bodembedekker voor droge schaduw. Delicate bloempjes in het voorjaar, gevolgd door fraai getekend blad. Epimedium \'Amber Queen\' is bijzonder.', light: ['schaduw'] },
  'Helleborus': { common: 'kerstroos', type: 'shade', desc: 'Winterbloeier bij uitstek. H. orientalis hybriden bieden bloemen van januari tot april in roze, wit, groen en paars. Onmisbaar voor vroege kleur in schaduwborders.', light: ['hs', 'schaduw'] },
  'Hosta': { common: 'hartlelie', type: 'shade', desc: 'Koningin van de schaduwborder met spectaculair blad in alle maten en kleuren. H. \'Halcyon\' (blauw) en H. \'Sum and Substance\' (goud) zijn iconisch. Textuurplant.', light: ['hs', 'schaduw'] },
  'Pulmonaria': { common: 'longkruid', type: 'shade', desc: 'Vroege bloeier met gespikkeld blad dat de hele zomer decoratief blijft. Bloemen veranderen van roze naar blauw. Uitstekend voor schaduwrijke plekken onder bomen.', light: ['hs', 'schaduw'] },
  'Rodgersia': { common: 'schout-bij-nacht', type: 'shade', desc: 'Imposante bladplant met handvormige bladeren tot 40cm breed. Pluimvormige bloemen in roze of wit. Spectaculair bij water of in vochtige schaduw. Architecturaal accent.', light: ['hs', 'schaduw'] },
  'Tiarella': { common: 'schuimbloem', type: 'shade', desc: 'Fijne schuimachtige bloemaren boven decoratief, vaak geaderd blad. Uitstekende bodembedekker voor schaduw. T. \'Spring Symphony\' en \'Sugar and Spice\' zijn favorieten.', light: ['schaduw'] },
  'Anemone': { common: 'anemoon', type: 'shade', desc: 'Elegante herfstbloeier. A. x hybrida \'Honorine Jobert\' (wit) is onmisbaar. Witte schotelbloemen op slanke stelen van augustus tot oktober. Vermeerdert langzaam via worteluitlopers.', light: ['hs', 'schaduw'] }
};

function renderGenera(app, params) {
  var page = el('div', 'page');
  page.appendChild(makePageTitle([{ text: 'Genera ' }, { text: 'Gids', em: true }]));

  // Intro text
  var intro = el('p', '', 'Genera die nog niet op je lijst staan maar goed zouden passen in je prairieborder. Klik op \u201CCatalogus\u201D om varianten te bekijken en toe te voegen.');
  intro.style.cssText = 'font-size:12px;color:var(--ink-40);margin-bottom:24px;max-width:600px';
  page.appendChild(intro);

  // Determine which genera the user already has plants from
  var selected = Store.getSelected();
  var userGenera = {};
  selected.forEach(function(item) {
    if (item.plant) userGenera[item.plant.genus] = true;
  });

  // Count plants in catalog per genus
  var genusCatalogCount = {};
  CATALOG.forEach(function(p) {
    genusCatalogCount[p.genus] = (genusCatalogCount[p.genus] || 0) + 1;
  });

  // Count selected per genus
  var genusSelectedCount = {};
  selected.forEach(function(item) {
    if (item.plant) genusSelectedCount[item.plant.genus] = (genusSelectedCount[item.plant.genus] || 0) + item.selection.qty;
  });

  // Prairie genera (only those not in user's border)
  var prairieGenera = ['Rudbeckia', 'Molinia', 'Panicum', 'Calamagrostis', 'Stipa', 'Sporobolus', 'Echinops', 'Persicaria', 'Nepeta', 'Geranium', 'Actaea'];
  var shadeGenera = ['Astrantia', 'Brunnera', 'Campanula', 'Digitalis', 'Epimedium', 'Helleborus', 'Hosta', 'Pulmonaria', 'Rodgersia', 'Tiarella', 'Anemone'];

  var filteredPrairie = prairieGenera.filter(function(g) { return !userGenera[g]; });
  var filteredShade = shadeGenera.filter(function(g) { return !userGenera[g]; });

  // Prairie section
  if (filteredPrairie.length > 0) {
    var prairieHeader = el('div', 'group-header');
    prairieHeader.style.marginTop = '0';
    prairieHeader.appendChild(el('span', 'group-title', 'Prairie-toevoegingen'));
    prairieHeader.appendChild(el('span', 'group-count', filteredPrairie.length + ' genera'));
    page.appendChild(prairieHeader);

    var prairieGrid = el('div', 'genera-grid');
    filteredPrairie.forEach(function(genusName) {
      prairieGrid.appendChild(buildGenusCard(genusName, 'prairie', genusCatalogCount, genusSelectedCount));
    });
    page.appendChild(prairieGrid);
  }

  // Shade section
  if (filteredShade.length > 0) {
    var shadeHeader = el('div', 'group-header');
    shadeHeader.appendChild(el('span', 'group-title', 'Schaduw-genera'));
    shadeHeader.appendChild(el('span', 'group-count', filteredShade.length + ' genera'));
    page.appendChild(shadeHeader);

    var shadeGrid = el('div', 'genera-grid');
    filteredShade.forEach(function(genusName) {
      shadeGrid.appendChild(buildGenusCard(genusName, 'shade', genusCatalogCount, genusSelectedCount));
    });
    page.appendChild(shadeGrid);
  }

  // Empty state
  if (filteredPrairie.length === 0 && filteredShade.length === 0) {
    var empty = el('div', '', 'Je hebt al planten van alle voorgestelde genera geselecteerd. Goed bezig!');
    empty.style.cssText = 'padding:40px 0;text-align:center;color:var(--ink-40);font-size:14px';
    page.appendChild(empty);
  }

  app.appendChild(page);
}

function buildGenusCard(genusName, type, genusCatalogCount, genusSelectedCount) {
  var info = GENERA_INFO[genusName] || { common: '', desc: '', light: [] };
  var card = el('div', 'genera-card');

  // Head
  var head = el('div', 'genera-card-head');
  head.appendChild(el('span', 'genera-card-name', genusName));
  head.appendChild(el('span', 'genera-card-common', info.common));

  var tag = el('span', 'genus-tag');
  tag.style.marginLeft = 'auto';
  if (type === 'prairie') {
    tag.className = 'genus-tag suggested';
    tag.textContent = 'Suggestie';
  } else {
    tag.className = 'genus-tag shade';
    tag.textContent = '\u263E Schaduw';
  }
  head.appendChild(tag);
  card.appendChild(head);

  // Description
  card.appendChild(el('div', 'genera-desc', info.desc));

  // Stats row
  var stats = el('div', 'genera-stats');

  var selCount = genusSelectedCount[genusName] || 0;
  var selSpan = el('span');
  var strong = el('strong', '', String(selCount));
  selSpan.appendChild(strong);
  selSpan.appendChild(document.createTextNode(' geselecteerd'));
  stats.appendChild(selSpan);

  var catCount = genusCatalogCount[genusName] || 0;
  stats.appendChild(el('span', '', catCount + ' in catalogus'));

  // Light icons
  var lightText = '';
  if (info.light.indexOf('zon') >= 0) lightText += '\u2600 Zon';
  if (info.light.indexOf('hs') >= 0) lightText += (lightText ? ' \u00B7 ' : '') + '\u26C5 HS';
  if (info.light.indexOf('schaduw') >= 0) lightText += (lightText ? ' \u00B7 ' : '') + '\u263E S';
  if (lightText) stats.appendChild(el('span', '', lightText));

  // Catalogus link
  var link = el('a', 'genera-link', '\u2192 Catalogus');
  link.href = '#/catalogus?genus=' + genusName;
  stats.appendChild(link);

  card.appendChild(stats);

  return card;
}
