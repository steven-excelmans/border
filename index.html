<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prairieborder Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --bg: #f4f0e8;
  --bg-warm: #f0ebe1;
  --card: #fffdf8;
  --card-hover: #fff;
  --ink: #2a2520;
  --ink-70: rgba(42,37,32,0.7);
  --ink-40: rgba(42,37,32,0.4);
  --ink-20: rgba(42,37,32,0.2);
  --ink-10: rgba(42,37,32,0.1);
  --moss: #4a5a3c;
  --moss-light: #6b7d5a;
  --moss-pale: #d4dbc8;
  --moss-10: rgba(74,90,60,0.1);
  --copper: #b87333;
  --copper-light: #d4956a;
  --copper-10: rgba(184,115,51,0.1);
  --terra: #8b5e3c;
  --border: #d6cfc4;
  --border-light: #e8e2d6;
  --shadow-sm: 0 1px 3px rgba(42,37,32,0.06);
  --shadow-md: 0 4px 12px rgba(42,37,32,0.08);
  --shadow-lg: 0 8px 32px rgba(42,37,32,0.1);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;

  --c-roze: #e91e8c; --c-paars: #7b1fa2; --c-wit: #e0e0e0;
  --c-geel: #fdd835; --c-oranje: #f57c00; --c-rood: #d32f2f;
  --c-blauw: #1976d2; --c-groen: #4caf50; --c-lila: #9575cd;
  --c-rozepaars: #ad1457;

  --cat-grassen: #7cb342; --cat-cool: #5c6bc0; --cat-warm-a: #ef5350;
  --cat-warm-b: #ff7043; --cat-asters: #ab47bc; --cat-extra: #78909c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scrollbar-width: none; scroll-behavior: smooth; }
html::-webkit-scrollbar { display: none; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Texture overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ═══════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════ */
.nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
}

.nav-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  height: 56px;
  gap: 32px;
}

.nav-logo {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  font-size: 22px;
  color: var(--ink);
  letter-spacing: -0.02em;
  white-space: nowrap;
  text-decoration: none;
}

.nav-badges {
  display: flex;
  gap: 8px;
  margin-left: 4px;
}

.nav-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.nav-badge.plants {
  background: var(--moss-10);
  color: var(--moss);
}

.nav-badge.cost {
  background: var(--copper-10);
  color: var(--copper);
}

.nav-links {
  display: flex;
  gap: 0;
  margin-left: auto;
  list-style: none;
}

.nav-links a {
  display: block;
  padding: 18px 16px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--ink-40);
  text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}

.nav-links a:hover { color: var(--ink-70); }
.nav-links a.active {
  color: var(--moss);
  border-bottom-color: var(--moss);
}

/* ═══════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════ */
.page { max-width: 1400px; margin: 0 auto; padding: 32px; }

.section-divider {
  margin: 80px 32px;
  max-width: 1400px;
  margin-left: auto;
  margin-right: auto;
  border: none;
  border-top: 1px solid var(--border);
  position: relative;
}

.section-divider::after {
  content: attr(data-label);
  position: absolute;
  top: -9px;
  left: 0;
  background: var(--bg);
  padding-right: 16px;
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ink-40);
}

.page-title {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 32px;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
  line-height: 1.1;
}

.page-title em { font-style: italic; color: var(--moss); font-weight: 400; }

/* ═══════════════════════════════════════════════════
   CARDS & PANELS
   ═══════════════════════════════════════════════════ */
.panel {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 24px;
}

.panel-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ink-40);
  margin-bottom: 16px;
}

/* ═══════════════════════════════════════════════════
   DASHBOARD
   ═══════════════════════════════════════════════════ */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}

/* Category bars */
.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

.cat-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.cat-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.cat-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-70);
}

.cat-nums {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}

.cat-bar {
  height: 6px;
  background: var(--ink-10);
  border-radius: 3px;
  overflow: visible;
  position: relative;
}

.cat-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

.cat-bar-target {
  position: absolute;
  top: -3px;
  bottom: -3px;
  width: 2px;
  background: var(--ink-40);
  border-radius: 1px;
}

/* Spectrum */
.spectrum {
  height: 24px;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
}

.spectrum-seg { height: 100%; transition: width 0.4s ease; }

.spectrum-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 12px;
  margin-top: 10px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--ink-40);
}

.legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Light bars */
.light-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.light-icon { width: 20px; text-align: center; font-size: 14px; }
.light-label { width: 80px; font-size: 11px; color: var(--ink-70); }

.light-bar {
  flex: 1;
  height: 6px;
  background: var(--ink-10);
  border-radius: 3px;
  overflow: hidden;
}

.light-fill { height: 100%; border-radius: 3px; }
.light-pct { width: 32px; text-align: right; font-size: 11px; font-weight: 600; color: var(--ink-70); font-variant-numeric: tabular-nums; }

/* Cost */
.cost-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 8px 0;
  border-bottom: 1px solid var(--ink-10);
}

.cost-row:last-child { border-bottom: none; font-weight: 600; }
.cost-supplier { font-size: 12px; color: var(--ink-70); }
.cost-count { font-size: 11px; color: var(--ink-40); margin-left: 8px; }
.cost-amount { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }

/* ═══════════════════════════════════════════════════
   CATALOGUS
   ═══════════════════════════════════════════════════ */
.filter-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.filter-search {
  flex: 1;
  min-width: 200px;
  padding: 9px 14px 9px 36px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--card);
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--ink);
  outline: none;
}

.filter-search:focus { border-color: var(--moss); box-shadow: 0 0 0 3px var(--moss-10); }

.filter-btn {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--card);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-40);
  cursor: pointer;
  transition: all 0.15s;
}

.filter-btn:hover { border-color: var(--ink-20); color: var(--ink-70); }
.filter-btn.active { background: var(--moss); color: #fff; border-color: var(--moss); }

/* Genus header */
.genus-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 16px 0 12px;
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 20px;
}

.genus-name {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  font-size: 26px;
  letter-spacing: -0.01em;
}

.genus-common { font-size: 12px; color: var(--ink-40); }

.genus-tag {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 4px;
}

.genus-tag.my-list { background: var(--moss); color: #fff; }
.genus-tag.suggested { background: var(--copper); color: #fff; }
.genus-tag.shade { background: #2e4a3a; color: #c8dcc8; }

.genus-count { margin-left: auto; font-size: 11px; color: var(--ink-40); }

/* Plant cards */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.plant-card {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  position: relative;
}

.plant-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.plant-card.selected { border-color: var(--moss); box-shadow: 0 0 0 1px var(--moss); }
.plant-card.unavailable { opacity: 0.5; }

/* Badge */
.card-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  z-index: 5;
}

.card-badge.in-border { background: var(--moss); color: #fff; }
.card-badge.unavailable { background: #999; color: #fff; }

/* Card add button */
.card-add {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--ink-40);
  cursor: pointer;
  z-index: 5;
  transition: all 0.15s;
}

.card-add:hover { background: var(--moss); color: #fff; border-color: var(--moss); }

/* Image */
.card-img {
  height: 160px;
  position: relative;
  overflow: hidden;
}

.card-img-gradient {
  width: 100%;
  height: 100%;
}

/* Body */
.card-body {
  padding: 14px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-species {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 15px;
  line-height: 1.3;
  margin-bottom: 1px;
}

.card-variant {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
}

.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: auto;
}

.meta-pill {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  background: var(--ink-10);
  color: var(--ink-70);
}

.meta-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.1);
  flex-shrink: 0;
}

/* Card footer — both suppliers */
.card-footer {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--ink-10);
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.supplier-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
}

.supplier-name { color: var(--ink-40); font-weight: 500; }
.supplier-name .code { color: var(--ink-20); margin-left: 4px; }
.supplier-price { font-weight: 600; font-variant-numeric: tabular-nums; }
.supplier-price.cheapest { color: var(--moss); }

.supplier-row.unavailable .supplier-name { color: var(--ink-20); text-decoration: line-through; }
.supplier-row.unavailable .supplier-price { color: var(--ink-20); }

/* Qty stepper */
.qty-stepper {
  display: flex;
  align-items: center;
  gap: 0;
  margin-top: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  align-self: stretch;
}

.qty-btn {
  width: 32px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--card);
  border: none;
  cursor: pointer;
  font-size: 14px;
  color: var(--ink-40);
  transition: all 0.1s;
}

.qty-btn:hover { background: var(--ink-10); color: var(--ink); }

.qty-val {
  flex: 1;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 4px 0;
}

/* ═══════════════════════════════════════════════════
   MIJN BORDER (TABLE)
   ═══════════════════════════════════════════════════ */
.view-toggle {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 20px;
  width: fit-content;
}

.view-toggle-btn {
  padding: 7px 16px;
  font-size: 11px;
  font-weight: 500;
  background: var(--card);
  border: none;
  cursor: pointer;
  color: var(--ink-40);
}

.view-toggle-btn.active { background: var(--moss); color: #fff; }

.group-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 8px;
  margin-top: 24px;
}

.group-header:first-of-type { margin-top: 0; }

.group-title {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 18px;
  color: var(--ink);
}

.group-count {
  font-size: 12px;
  color: var(--ink-40);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}

.border-row {
  display: grid;
  grid-template-columns: 28px 44px 1fr 100px 100px 80px 65px 65px 28px;
  gap: 10px;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--ink-10);
  font-size: 12px;
}

.border-row select { font-size: 11px; padding: 4px 6px; }

.border-row:hover { background: var(--ink-10); border-radius: var(--radius-sm); }

.row-thumb {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.row-thumb-img { width: 100%; height: 100%; object-fit: cover; }
.row-thumb-gradient { width: 100%; height: 100%; border-radius: var(--radius-sm); }

.row-name { font-size: 12px; }
.row-species { font-family: var(--font-display); font-style: italic; font-size: 13px; }
.row-variant { font-weight: 500; font-size: 12px; }

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.status-pill.must-have { background: var(--moss-10); color: var(--moss); }
.status-pill.variant-flex { background: var(--copper-10); color: var(--copper); }
.status-pill.alternatief { background: rgba(25,118,210,0.1); color: #1976d2; }

.row-stepper {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.row-stepper-btn {
  width: 24px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--card);
  border: none;
  cursor: pointer;
  font-size: 12px;
  color: var(--ink-40);
}

.row-stepper-val {
  width: 28px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

.row-supplier {
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  font-family: var(--font-body);
  background: var(--card);
  color: var(--ink-70);
}

.row-price { font-variant-numeric: tabular-nums; font-weight: 500; }
.row-total { font-variant-numeric: tabular-nums; font-weight: 600; }
.row-expand { cursor: pointer; color: var(--ink-40); font-size: 16px; }

/* ═══════════════════════════════════════════════════
   GENERA GIDS
   ═══════════════════════════════════════════════════ */
.genera-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.genera-card {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: box-shadow 0.2s;
}

.genera-card:hover { box-shadow: var(--shadow-md); }

.genera-card-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 10px;
}

.genera-card-name {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 20px;
  font-weight: 400;
}

.genera-card-common { font-size: 12px; color: var(--ink-40); }

.genera-desc {
  font-size: 12px;
  color: var(--ink-70);
  line-height: 1.6;
  margin: 10px 0;
}

.genera-stats {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 11px;
  color: var(--ink-40);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--ink-10);
}

.genera-link {
  margin-left: auto;
  font-size: 11px;
  font-weight: 500;
  color: var(--moss);
  text-decoration: none;
}

.genera-link:hover { text-decoration: underline; }

/* ═══════════════════════════════════════════════════
   BESTELLING
   ═══════════════════════════════════════════════════ */
.order-section {
  margin-bottom: 32px;
}

.order-section-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 12px 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 8px;
}

.order-section-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
}

.order-section-sub { font-size: 12px; color: var(--ink-40); }

.order-table { width: 100%; border-collapse: collapse; }

.order-table th {
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-40);
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
}

.order-table th:last-child, .order-table td:last-child { text-align: right; }

.order-table td {
  padding: 10px 0;
  border-bottom: 1px solid var(--ink-10);
  font-size: 12px;
}

.order-table .plant-name {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 14px;
}

.order-table .plant-variant { font-weight: 500; font-style: normal; }

.order-total-bar {
  background: var(--ink);
  color: #fff;
  padding: 16px 24px;
  border-radius: var(--radius-md);
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
}

.order-total-label { font-size: 14px; font-weight: 500; }
.order-total-amount { font-family: var(--font-display); font-size: 28px; font-weight: 300; }

.order-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.btn {
  padding: 10px 20px;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--ink);
  transition: all 0.15s;
}

.btn:hover { border-color: var(--ink-20); }
.btn.primary { background: var(--moss); color: #fff; border-color: var(--moss); }
.btn.primary:hover { background: var(--moss-light); }

.custom-add {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--ink-40);
  font-size: 12px;
  transition: all 0.15s;
}

.custom-add:hover { border-color: var(--moss); color: var(--moss); }

/* ═══════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════ */
/* === MOBILE: TABLET === */
@media (max-width: 1024px) {
  .dash-grid { grid-template-columns: 1fr 1fr; }
  .border-row { grid-template-columns: 44px 1fr 90px 80px 70px 55px 55px 24px; gap: 6px; font-size: 11px; }
}

/* === MOBILE: PHONE === */
@media (max-width: 768px) {
  /* Nav: bottom tab bar */
  .nav { position: fixed; bottom: 0; top: auto; border-bottom: none; border-top: 1px solid var(--border); padding: 0; z-index: 1000; width: 100%; background: var(--bg); }
  .nav-inner { height: auto; flex-wrap: wrap; padding: 0; gap: 0; }
  .nav-logo { display: none; }
  .nav-badges { position: fixed; top: 0; left: 0; right: 0; background: var(--bg); padding: 8px 16px; border-bottom: 1px solid var(--border); z-index: 999; justify-content: center; gap: 12px; margin: 0; }
  .nav-links { width: 100%; justify-content: space-around; margin: 0; }
  .nav-links a { padding: 10px 4px; font-size: 9px; letter-spacing: 0.3px; text-align: center; flex: 1; border-bottom: none; border-top: 2px solid transparent; }
  .nav-links a.active { border-top-color: var(--moss); border-bottom-color: transparent; }

  /* Content area: account for top badges + bottom nav */
  #app { padding-bottom: 60px; padding-top: 40px; min-height: calc(100vh - 100px); }
  .page { padding: 16px 12px; }
  .page-title { font-size: 24px; margin-bottom: 16px; }

  /* Dashboard */
  .dash-grid { grid-template-columns: 1fr !important; }
  .cat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .panel { padding: 16px; }
  .panel-label { font-size: 9px; letter-spacing: 2px; }

  /* Catalog cards */
  .card-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .card-img { height: 120px; }
  .card-body { padding: 10px; }
  .card-species { font-size: 13px; }
  .card-variant { font-size: 12px; }
  .meta-pill { font-size: 9px; padding: 1px 6px; }
  .supplier-row { font-size: 10px; }
  .card-footer { gap: 2px; }
  .qty-stepper { margin-top: 8px; }
  .qty-btn { width: 36px; height: 34px; font-size: 16px; }
  .qty-val { font-size: 14px; padding: 6px 0; }

  /* Filter bar */
  .filter-bar { gap: 6px; }
  .filter-search { min-width: 100%; font-size: 14px; padding: 10px 14px 10px 36px; }
  .filter-btn { padding: 8px 10px; font-size: 10px; }

  /* Genus header */
  .genus-header { flex-wrap: wrap; gap: 6px; }
  .genus-name { font-size: 20px; }
  .genus-count { width: 100%; }

  /* Border table → simplified */
  .border-row { grid-template-columns: 36px 1fr auto auto; gap: 6px; padding: 10px 0; font-size: 11px; }
  .border-row > div:nth-child(n+5) { display: none; } /* Hide supplier, price cols on mobile */
  .group-header { flex-wrap: wrap; gap: 4px; }
  .row-stepper { transform: scale(1.1); }

  /* Genera */
  .genera-grid { grid-template-columns: 1fr; gap: 12px; }
  .genera-card { padding: 14px; }
  .genera-card-name { font-size: 18px; }
  .genera-desc { font-size: 11px; }

  /* Order */
  .order-table { font-size: 11px; }
  .order-table th { font-size: 8px; }
  .order-total-bar { padding: 12px 16px; flex-wrap: wrap; gap: 4px; }
  .order-total-amount { font-size: 22px; }
  .order-actions { flex-wrap: wrap; }
  .order-actions .btn { flex: 1; text-align: center; }

  /* Spectrum */
  .spectrum { height: 20px; border-radius: 10px; }
  .spectrum-legend { gap: 3px 8px; }
  .legend-item { font-size: 9px; }

  /* Cost panel */
  .panel[style*="grid-column"] > div[style*="grid-template-columns"] { grid-template-columns: 1fr 1fr !important; }
}

/* === MOBILE: SMALL PHONE === */
@media (max-width: 400px) {
  .card-grid { grid-template-columns: 1fr; }
  .cat-grid { grid-template-columns: 1fr; }
  .nav-links a { font-size: 8px; padding: 8px 2px; }
  .border-row { grid-template-columns: 1fr auto; }
  .border-row > div:nth-child(1) { display: none; } /* hide thumb */
}

/* === APP ADDITIONS === */
#app { min-height: calc(100vh - 56px); }
.view-enter { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.placeholder-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
.placeholder-view h2 { font-family: var(--font-display); font-weight: 300; font-size: 36px; color: var(--ink-20); margin-bottom: 8px; }
.placeholder-view p { color: var(--ink-20); font-size: 13px; }

/* === EXPAND PANEL === */
.border-detail-panel {
  grid-column: 1 / -1;
  background: var(--bg-warm);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  margin: 0 0 4px 0;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--ink-10);
}
.border-detail-panel .detail-section { flex: 1; min-width: 200px; }
.border-detail-panel .detail-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--ink-40); margin-bottom: 6px;
}
.border-detail-panel .alt-pills {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
}
.border-detail-panel .alt-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 12px; font-size: 10px;
  background: var(--moss-10); color: var(--moss); font-weight: 500;
}
.border-detail-panel .alt-pill-remove {
  cursor: pointer; font-size: 12px; color: var(--ink-40);
  margin-left: 2px; line-height: 1;
}
.border-detail-panel .alt-pill-remove:hover { color: var(--ink); }
.border-detail-panel .alt-search {
  width: 100%; padding: 6px 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 11px;
  font-family: var(--font-body); background: var(--card);
}
.border-detail-panel .alt-dropdown {
  position: absolute; z-index: 100; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  max-height: 160px; overflow-y: auto; width: 100%;
  box-shadow: var(--shadow-md);
}
.border-detail-panel .alt-dropdown-item {
  padding: 6px 10px; font-size: 11px; cursor: pointer;
}
.border-detail-panel .alt-dropdown-item:hover { background: var(--moss-10); }
.border-detail-panel .plant-notes {
  width: 100%; min-height: 60px; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 11px; font-family: var(--font-body);
  background: var(--card); resize: vertical;
}
.row-expand-arrow {
  cursor: pointer; color: var(--ink-40); font-size: 12px;
  transition: transform 0.2s; user-select: none; display: inline-block;
}
.row-expand-arrow.open { transform: rotate(180deg); }

/* === DRAG REORDER === */
.border-row.drag-over { border-top: 2px solid var(--moss); }
.border-row.dragging { opacity: 0.4; }

/* === CLICKABLE DASHBOARD === */
.cat-item.clickable { cursor: pointer; }
.cat-item.clickable:hover { opacity: 0.8; }
.spectrum-seg.clickable { cursor: pointer; }
.spectrum-seg.clickable:hover { opacity: 0.8; }

/* === CATALOG CATEGORY FILTER === */
.filter-btn.category-active {
  background: var(--moss); color: #fff;
}

var Store = {
  _state: null,
  _listeners: [],

  init: function() {
    // Check for shared URL state first
    if (this.loadFromURL()) return;

    var saved = localStorage.getItem('prairieborder-state');
    if (saved) {
      try {
        this._state = JSON.parse(saved);
        // Auto-fill missing categories from GENUS_CATEGORIES
        var changed = false;
        for (var pid in this._state.selections) {
          var sel = this._state.selections[pid];
          if (!sel.category) {
            var plant = CATALOG_BY_ID[pid];
            if (plant && GENUS_CATEGORIES[plant.genus]) {
              sel.category = GENUS_CATEGORIES[plant.genus];
              changed = true;
            }
          }
        }
        if (changed) this._persist();
        return;
      } catch(e) {}
    }
    this._state = {
      selections: JSON.parse(JSON.stringify(DEFAULT_SELECTIONS)),
      customPlants: [],
      settings: { lastRoute: '#/', catalogView: 'grid' }
    };
    this._persist();
  },

  get: function(key) { return this._state[key]; },

  togglePlant: function(id) {
    if (this._state.selections[id]) {
      delete this._state.selections[id];
    } else {
      var p = CATALOG_BY_ID[id];
      this._state.selections[id] = {
        qty: 1, status: 'must-have',
        supplier: (function() {
          if (!p) return '';
          var nrPrice = (p.nr && p.code) ? (NR_PRICES[p.code] || 999) : 999;
          var vaPrice = (p.va && p.vaPrice) ? p.vaPrice : 999;
          if (vaPrice < 999 && nrPrice < 999) return vaPrice <= nrPrice ? 'VA' : 'NR';
          if (vaPrice < 999) return 'VA';
          if (nrPrice < 999) return 'NR';
          return '';
        })(),
        category: (p && GENUS_CATEGORIES[p.genus]) || '',
        notes: '', alternatives: [], sortOrder: null
      };
    }
    this._notify();
  },

  setQty: function(id, qty) {
    if (!this._state.selections[id]) return;
    if (qty <= 0) { delete this._state.selections[id]; }
    else { this._state.selections[id].qty = qty; }
    this._notify();
  },

  setStatus: function(id, s) { if (this._state.selections[id]) { this._state.selections[id].status = s; this._notify(); } },
  setSupplier: function(id, s) { if (this._state.selections[id]) { this._state.selections[id].supplier = s; this._notify(); } },
  setCategory: function(id, c) { if (this._state.selections[id]) { this._state.selections[id].category = c; this._notify(); } },
  setAlternatives: function(id, arr) { if (this._state.selections[id]) { this._state.selections[id].alternatives = arr; this._notify(); } },
  setNotes: function(id, text) { if (this._state.selections[id]) { this._state.selections[id].notes = text; this._notify(); } },
  setPurchased: function(id, val) { if (this._state.selections[id]) { this._state.selections[id].purchased = !!val; this._notify(); } },
  setSortOrder: function(id, order) { if (this._state.selections[id]) { this._state.selections[id].sortOrder = order; this._notify(); } },
  setSetting: function(k, v) { this._state.settings[k] = v; this._persist(); },

  isSelected: function(id) { return !!this._state.selections[id]; },
  getSelection: function(id) { return this._state.selections[id]; },

  getSelected: function() {
    var self = this;
    return Object.keys(this._state.selections).map(function(id) {
      return { id: id, plant: CATALOG_BY_ID[id] || null, selection: self._state.selections[id] };
    }).filter(function(x) { return x.plant; });
  },

  getTotals: function() {
    var selected = this.getSelected();
    var totalQty = 0, totalCost = 0;
    var perCat = {}, perSupplier = { NR: { qty: 0, cost: 0 }, VA: { qty: 0, cost: 0 } };
    Object.keys(CAT_TARGETS).forEach(function(c) { perCat[c] = 0; });

    selected.forEach(function(item) {
      var qty = item.selection.qty || 0;
      totalQty += qty;
      var cat = item.selection.category || '';
      if (perCat[cat] !== undefined) perCat[cat] += qty;
      var sup = item.selection.supplier;
      var price = 0;
      if (sup === 'NR' && item.plant.code) price = NR_PRICES[item.plant.code] || 0;
      else if (sup === 'VA' && item.plant.vaPrice) price = item.plant.vaPrice;
      totalCost += price * qty;
      if (sup === 'NR') { perSupplier.NR.qty += qty; perSupplier.NR.cost += price * qty; }
      if (sup === 'VA') { perSupplier.VA.qty += qty; perSupplier.VA.cost += price * qty; }
    });
    return { totalQty: totalQty, totalCost: totalCost, perCategory: perCat, perSupplier: perSupplier };
  },

  subscribe: function(fn) { this._listeners.push(fn); },
  _notify: function() { this._persist(); var s = this._state; this._listeners.forEach(function(fn) { fn(s); }); },
  _persist: function() { localStorage.setItem('prairieborder-state', JSON.stringify(this._state)); },

  exportJSON: function() {
    var blob = new Blob([JSON.stringify(this._state, null, 2)], { type: 'application/json' });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'prairieborder-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
  },

  shareURL: function() {
    // Compress selections to a minimal format for URL sharing
    var compact = {};
    for (var pid in this._state.selections) {
      var s = this._state.selections[pid];
      // Only store non-default values: q=qty, s=status(m/v/a), p=supplier, c=category
      var entry = s.qty > 1 ? String(s.qty) : '';
      if (s.status !== 'must-have') entry += (s.status === 'variant-flex' ? 'v' : 'a');
      if (s.supplier === 'VA') entry += 'V';
      compact[pid] = entry;
    }
    var json = JSON.stringify(compact);
    var encoded = btoa(unescape(encodeURIComponent(json)));
    var url = location.origin + location.pathname + '?state=' + encoded + '#/';
    navigator.clipboard.writeText(url).then(function() {
      alert('Link gekopieerd! Plak in je browser op een ander device.');
    });
  },

  loadFromURL: function() {
    var match = location.search.match(/state=([^&]+)/);
    if (!match) return false;
    try {
      var json = decodeURIComponent(escape(atob(match[1])));
      var compact = JSON.parse(json);
      var selections = {};
      for (var pid in compact) {
        var entry = compact[pid];
        var qty = parseInt(entry) || 1;
        var status = 'must-have';
        if (entry.indexOf('v') > -1) status = 'variant-flex';
        if (entry.indexOf('a') > -1) status = 'alternatief';
        var supplier = entry.indexOf('V') > -1 ? 'VA' : 'NR';
        var plant = CATALOG_BY_ID[pid];
        selections[pid] = {
          qty: qty, status: status, supplier: supplier,
          category: (plant && GENUS_CATEGORIES[plant.genus]) || '',
          notes: '', alternatives: []
        };
      }
      this._state = { selections: selections, customPlants: [], settings: { lastRoute: '#/', catalogView: 'grid' } };
      this._persist();
      // Clean URL
      history.replaceState(null, '', location.pathname + '#/');
      return true;
    } catch(e) { return false; }
  },

  importJSON: function(file) {
    var self = this;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (data.selections) { self._state = data; self._notify(); Router.navigate('#/'); }
      } catch(err) { alert('Ongeldig JSON bestand'); }
    };
    reader.readAsText(file);
  },

  resetToDefaults: function() {
    if (!confirm('Alle wijzigingen resetten?')) return;
    this._state.selections = JSON.parse(JSON.stringify(DEFAULT_SELECTIONS));
    this._notify();
  }
};

// === ROUTER ===
var Router = {
  routes: { '/': renderDashboard, '/catalogus': renderCatalog, '/border': renderBorder, '/genera': renderGenera, '/bestelling': renderOrder },

  init: function() {
    window.addEventListener('hashchange', this.handleRoute.bind(this));
    if (!location.hash) location.hash = '#/';
    this.handleRoute();
  },

  handleRoute: function() {
    var hash = location.hash.replace('#', '') || '/';
    var path = hash.split('?')[0];
    var params = {};
    var qs = hash.split('?')[1];
    if (qs) qs.split('&').forEach(function(p) { var kv = p.split('='); params[kv[0]] = decodeURIComponent(kv[1] || ''); });
    var renderFn = this.routes[path] || this.routes['/'];
    Store.setSetting('lastRoute', '#' + hash);
    this.updateNav(path);
    var app = document.getElementById('app');
    app.textContent = '';
    app.className = '';
    void app.offsetHeight;
    app.className = 'view-enter';
    renderFn(app, params);
  },

  navigate: function(hash) { location.hash = hash; },

  updateNav: function(path) {
    document.querySelectorAll('.nav-links a').forEach(function(a) {
      a.classList.toggle('active', a.getAttribute('data-route') === path);
    });
  }
};

  catPanel.appendChild(catGrid);

  dashGrid.appendChild(catPanel);

  // === HEIGHT SPECTRUM panel (separate card) ===
  var heightPanel = document.createElement('div');
  heightPanel.className = 'panel';
  var heightLabel = document.createElement('div');
  heightLabel.className = 'panel-label';
  heightLabel.textContent = 'Hoogteverdeling';
  heightPanel.appendChild(heightLabel);

  var heightChart = document.createElement('div');
  heightChart.style.cssText = 'display:flex;align-items:flex-end;gap:4px;height:100px';
  var heightLegend = document.createElement('div');
  heightLegend.style.cssText = 'display:flex;justify-content:space-between;font-size:9px;color:var(--ink-40);margin-top:4px';

  var HEIGHT_BANDS = [
    { label: '<30', min: 0, max: 30, color: '#a5d6a7' },
    { label: '30-50', min: 30, max: 50, color: '#81c784' },
    { label: '50-80', min: 50, max: 80, color: '#66bb6a' },
    { label: '80-100', min: 80, max: 100, color: '#4caf50' },
    { label: '100-130', min: 100, max: 130, color: '#43a047' },
    { label: '130-160', min: 130, max: 160, color: '#388e3c' },
    { label: '160-200', min: 160, max: 200, color: '#2e7d32' },
    { label: '>200', min: 200, max: 999, color: '#1b5e20' }
  ];

  var heightBars = [];

  function buildHeightChart() {
    heightChart.textContent = '';
    heightLegend.textContent = '';
    var selected = Store.getSelected();
    var bandCounts = HEIGHT_BANDS.map(function() { return 0; });

    selected.forEach(function(item) {
      var h = item.plant.hoogte || 0;
      var qty = item.selection.qty || 0;
      for (var i = 0; i < HEIGHT_BANDS.length; i++) {
        if (h >= HEIGHT_BANDS[i].min && (h < HEIGHT_BANDS[i].max || (i === HEIGHT_BANDS.length - 1 && h >= HEIGHT_BANDS[i].min))) {
          bandCounts[i] += qty;
          break;
        }
      }
    });

    var maxCount = Math.max.apply(null, bandCounts) || 1;

    HEIGHT_BANDS.forEach(function(band, i) {
      var col = document.createElement('div');
      col.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%';

      var count = document.createElement('div');
      count.style.cssText = 'font-size:10px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;margin-bottom:2px';
      count.textContent = bandCounts[i] > 0 ? bandCounts[i] : '';

      var bar = document.createElement('div');
      var h = bandCounts[i] > 0 ? Math.max((bandCounts[i] / maxCount) * 80, 4) : 0;
      bar.style.cssText = 'width:100%;border-radius:3px 3px 0 0;transition:height 0.3s ease;background:' + band.color;
      bar.style.height = h + 'px';

      col.appendChild(count);
      col.appendChild(bar);
      heightChart.appendChild(col);
    });

    HEIGHT_BANDS.forEach(function(band) {
      var lbl = document.createElement('span');
      lbl.textContent = band.label;
      lbl.style.cssText = 'flex:1;text-align:center';
      heightLegend.appendChild(lbl);
    });
  }

  buildHeightChart();
  heightPanel.appendChild(heightChart);
  heightPanel.appendChild(heightLegend);

  // Side profile visualization
  var profileWrap = document.createElement('div');
  profileWrap.style.cssText = 'margin-top:16px;border-top:1px solid var(--ink-10);padding-top:12px';
  var profileLabel = document.createElement('div');
  profileLabel.style.cssText = 'font-size:9px;color:var(--ink-40);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:8px';
  profileLabel.textContent = 'Zijaanzicht border';
  profileWrap.appendChild(profileLabel);

  var profileSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  profileSvg.setAttribute('viewBox', '0 0 400 130');
  profileSvg.style.cssText = 'width:100%;height:110px;display:block';

  function buildProfile() {
    while (profileSvg.firstChild) profileSvg.removeChild(profileSvg.firstChild);
    var selected = Store.getSelected();
    if (selected.length === 0) return;

    var maxH = 220;
    var groundY = 115;
    var topY = 10;

    // Ground line
    var ground = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ground.setAttribute('x1', '30'); ground.setAttribute('y1', String(groundY));
    ground.setAttribute('x2', '370'); ground.setAttribute('y2', String(groundY));
    ground.setAttribute('stroke', '#d6cfc4'); ground.setAttribute('stroke-width', '1');
    profileSvg.appendChild(ground);

    // Height guide lines
    [50, 100, 150, 200].forEach(function(h) {
      var y = groundY - ((h / maxH) * (groundY - topY));
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', '30'); line.setAttribute('y1', String(y));
      line.setAttribute('x2', '370'); line.setAttribute('y2', String(y));
      line.setAttribute('stroke', '#e8e2d6'); line.setAttribute('stroke-width', '0.5');
      line.setAttribute('stroke-dasharray', '3,3');
      profileSvg.appendChild(line);
      var txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', '27'); txt.setAttribute('y', String(y + 3));
      txt.setAttribute('fill', '#9e968c'); txt.setAttribute('font-size', '7');
      txt.setAttribute('text-anchor', 'end');
      txt.setAttribute('font-family', 'DM Sans, sans-serif');
      txt.textContent = h + '';
      profileSvg.appendChild(txt);
    });

    // Labels
    var frontLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    frontLabel.setAttribute('x', '35'); frontLabel.setAttribute('y', '126');
    frontLabel.setAttribute('fill', '#9e968c'); frontLabel.setAttribute('font-size', '7');
    frontLabel.setAttribute('font-family', 'DM Sans, sans-serif');
    frontLabel.textContent = 'VOOR';
    profileSvg.appendChild(frontLabel);
    var backLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    backLabel.setAttribute('x', '352'); backLabel.setAttribute('y', '126');
    backLabel.setAttribute('fill', '#9e968c'); backLabel.setAttribute('font-size', '7');
    backLabel.setAttribute('font-family', 'DM Sans, sans-serif');
    backLabel.textContent = 'ACHTER';
    profileSvg.appendChild(backLabel);

    // Collect all plant instances (expanded by qty, max 3 per plant)
    var bars = [];
    selected.forEach(function(item) {
      var h = item.plant.hoogte || 50;
      var c = COLOR_CSS[item.plant.kleur] || '#999';
      if (c === 'rainbow') c = '#e65100';
      var qty = Math.min(item.selection.qty || 1, 4);
      for (var q = 0; q < qty; q++) {
        bars.push({ h: h, color: c });
      }
    });

    // Sort by height (short first = front/left)
    bars.sort(function(a, b) { return a.h - b.h; });

    // Draw as vertical bars, evenly spaced
    var barWidth = Math.max(2, Math.min(6, 320 / bars.length));
    var gap = bars.length > 1 ? (320 - barWidth * bars.length) / (bars.length - 1) : 0;
    gap = Math.max(gap, 0.5);
    var totalW = bars.length * barWidth + (bars.length - 1) * gap;
    var startX = 35 + (320 - totalW) / 2;

    bars.forEach(function(b, i) {
      var x = startX + i * (barWidth + gap);
      var barH = Math.max((b.h / maxH) * (groundY - topY), 3);
      var y = groundY - barH;

      var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', String(x));
      rect.setAttribute('y', String(y));
      rect.setAttribute('width', String(barWidth));
      rect.setAttribute('height', String(barH));
      rect.setAttribute('rx', '1');
      rect.setAttribute('fill', b.color);
      rect.setAttribute('opacity', '0.75');
      profileSvg.appendChild(rect);
    });
  }

  buildProfile();
  profileWrap.appendChild(profileSvg);
  heightPanel.appendChild(profileWrap);

  dashGrid.appendChild(heightPanel);

  // === RIGHT COLUMN (Spectrum + Light) ===
  var rightCol = document.createElement('div');
  rightCol.style.cssText = 'display:flex;flex-direction:column;gap:20px';

  // -- Spectrum panel --
  var specPanel = document.createElement('div');
  specPanel.className = 'panel';
  specPanel.style.flex = '1';
  var specLabel = document.createElement('div');
  specLabel.className = 'panel-label';
  specLabel.textContent = 'Kleurenspectrum';
  specPanel.appendChild(specLabel);

  var spectrumBar = document.createElement('div');
  spectrumBar.className = 'spectrum';
  var specLegend = document.createElement('div');
  specLegend.className = 'spectrum-legend';

  function buildDashSpectrum() {
    spectrumBar.textContent = '';
    specLegend.textContent = '';
    var selected = Store.getSelected();
    var colorCounts = {};
    selected.forEach(function(item) {
      var k = item.plant.kleur;
      if (!k) return;
      colorCounts[k] = (colorCounts[k] || 0) + (item.selection.qty || 1);
    });
    var total = 0;
    Object.keys(colorCounts).forEach(function(c) { total += colorCounts[c]; });

    var colorOrder = ['wit','wit-roze','roze','rozepaars','lila','paars','blauw','groen','geel','oranje','oranje-rood','rood','zwart-bruin','beige','gemengd'];
    colorOrder.forEach(function(c) {
      if (!colorCounts[c]) return;
      var pct = total > 0 ? Math.max(2, Math.round((colorCounts[c] / total) * 100)) : 0;
      var seg = document.createElement('div');
      seg.className = 'spectrum-seg clickable';
      seg.style.width = pct + '%';
      seg.style.cursor = 'pointer';
      var css = COLOR_CSS[c] || '#999';
      if (css === 'rainbow') {
        seg.style.background = 'linear-gradient(90deg, #e91e8c, #fdd835, #1976d2, #4caf50)';
      } else {
        seg.style.background = css;
      }
      seg.addEventListener('click', (function(colorName) {
        return function() { Router.navigate('#/catalogus?kleur=' + encodeURIComponent(colorName)); };
      })(c));
      spectrumBar.appendChild(seg);

      var legendItem = document.createElement('span');
      legendItem.className = 'legend-item';
      var dot = document.createElement('span');
      dot.className = 'legend-dot';
      if (css === 'rainbow') {
        dot.style.background = 'linear-gradient(135deg, #e91e8c, #fdd835)';
      } else {
        dot.style.background = css;
      }
      legendItem.appendChild(dot);
      legendItem.appendChild(document.createTextNode(c + ' (' + colorCounts[c] + ')'));
      specLegend.appendChild(legendItem);
    });

    if (total === 0) {
      var emptySeg = document.createElement('div');
      emptySeg.className = 'spectrum-seg';
      emptySeg.style.width = '100%';
      emptySeg.style.background = 'var(--ink-10)';
      spectrumBar.appendChild(emptySeg);
    }
  }

  buildDashSpectrum();
  specPanel.appendChild(spectrumBar);
  specPanel.appendChild(specLegend);
  rightCol.appendChild(specPanel);

  // -- Light panel --
  var lightPanel = document.createElement('div');
  lightPanel.className = 'panel';
  lightPanel.style.flex = '1';
  var lightLabel = document.createElement('div');
  lightLabel.className = 'panel-label';
  lightLabel.textContent = 'Lichtbalans';
  lightPanel.appendChild(lightLabel);

  var lightRefs = {};
  var lightTypes = [
    { key: 'zon', icon: '\u2600', label: 'Zon', color: '#d4956a' },
    { key: 'hs', icon: '\u26C5', label: 'Halfschaduw', color: '#8da67b' },
    { key: 'schaduw', icon: '\u263E', label: 'Schaduw', color: '#5a6b4a' }
  ];

  function computeLight() {
    var selected = Store.getSelected();
    var counts = { zon: 0, hs: 0, schaduw: 0 };
    var totalLight = 0;
    selected.forEach(function(item) {
      var q = item.selection.qty || 1;
      if (item.plant.zon) { counts.zon += q; totalLight += q; }
      if (item.plant.hs) { counts.hs += q; totalLight += q; }
      if (item.plant.schaduw) { counts.schaduw += q; totalLight += q; }
    });
    return { counts: counts, total: totalLight };
  }

  var lightData = computeLight();
  lightTypes.forEach(function(lt) {
    var row = document.createElement('div');
    row.className = 'light-row';

    var icon = document.createElement('span');
    icon.className = 'light-icon';
    icon.textContent = lt.icon;
    row.appendChild(icon);

    var label = document.createElement('span');
    label.className = 'light-label';
    label.textContent = lt.label;
    row.appendChild(label);

    var barWrap = document.createElement('div');
    barWrap.className = 'light-bar';
    var fill = document.createElement('div');
    fill.className = 'light-fill';
    var pct = lightData.total > 0 ? Math.round((lightData.counts[lt.key] / lightData.total) * 100) : 0;
    fill.style.width = pct + '%';
    fill.style.background = lt.color;
    barWrap.appendChild(fill);
    row.appendChild(barWrap);

    var pctSpan = document.createElement('span');
    pctSpan.className = 'light-pct';
    pctSpan.textContent = pct + '%';
    row.appendChild(pctSpan);

    lightPanel.appendChild(row);
    lightRefs[lt.key] = { fill: fill, pct: pctSpan };
  });

  rightCol.appendChild(lightPanel);
  dashGrid.appendChild(rightCol);

  // === COST PANEL (full width) ===
  var costPanel = document.createElement('div');
  costPanel.className = 'panel';
  costPanel.style.gridColumn = '1 / -1';
  var costLabel = document.createElement('div');
  costLabel.className = 'panel-label';
  costLabel.textContent = 'Kosten';
  costPanel.appendChild(costLabel);

  var costGrid = document.createElement('div');
  costGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1px 1fr;gap:0;align-items:center';

  function makeCostCell(labelText, amount, count, isTotal) {
    var cell = document.createElement('div');
    cell.style.cssText = 'padding:16px 24px;text-align:center';
    var lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:11px;color:var(--ink-40);margin-bottom:4px';
    if (isTotal) { lbl.style.color = 'var(--moss)'; lbl.style.fontWeight = '600'; }
    lbl.textContent = labelText;
    cell.appendChild(lbl);

    var amt = document.createElement('div');
    amt.style.cssText = 'font-family:var(--font-display);font-size:' + (isTotal ? '36px' : '28px') + ';font-weight:' + (isTotal ? '400' : '300');
    if (isTotal) amt.style.color = 'var(--moss)';
    amt.textContent = '\u20AC' + amount.toFixed(2).replace('.', ',');
    cell.appendChild(amt);

    var cnt = document.createElement('div');
    cnt.style.cssText = 'font-size:11px;color:var(--ink-40);margin-top:2px';
    cnt.textContent = count + ' planten';
    cell.appendChild(cnt);

    return { el: cell, amtEl: amt, cntEl: cnt };
  }

  var nrCell = makeCostCell('Natu-Ral', totals.perSupplier.NR.cost, totals.perSupplier.NR.qty, false);
  var vaCell = makeCostCell('Van Asselberghs', totals.perSupplier.VA.cost, totals.perSupplier.VA.qty, false);
  var divider = document.createElement('div');
  divider.style.cssText = 'width:1px;height:48px;background:var(--border-light)';
  var totalCell = makeCostCell('Totaal', totals.totalCost, totals.totalQty, true);

  costGrid.appendChild(nrCell.el);
  costGrid.appendChild(vaCell.el);
  costGrid.appendChild(divider);
  costGrid.appendChild(totalCell.el);
  costPanel.appendChild(costGrid);

  // Export/Import buttons
  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;margin-top:16px;justify-content:center';

  var exportBtn = document.createElement('button');
  exportBtn.className = 'btn';
  exportBtn.textContent = '\u2193 Export JSON';
  exportBtn.addEventListener('click', function() { Store.exportJSON(); });
  btnRow.appendChild(exportBtn);

  var importBtn = document.createElement('button');
  importBtn.className = 'btn';
  importBtn.textContent = '\u2191 Import JSON';
  importBtn.addEventListener('click', function() {
    var inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.json';
    inp.addEventListener('change', function(e) {
      if (e.target.files[0]) Store.importJSON(e.target.files[0]);
    });
    inp.click();
  });
  btnRow.appendChild(importBtn);

  var resetBtn = document.createElement('button');
  resetBtn.className = 'btn';
  resetBtn.style.cssText = 'color:var(--copper);border-color:var(--copper)';
  resetBtn.textContent = '\u21BB Reset naar standaard';
  resetBtn.addEventListener('click', function() { Store.resetToDefaults(); Router.handleRoute(); });
  btnRow.appendChild(resetBtn);

  var shareBtn = document.createElement('button');
  shareBtn.className = 'btn';
  shareBtn.style.cssText = 'background:var(--moss);color:#fff;border-color:var(--moss)';
  shareBtn.textContent = '\uD83D\uDD17 Deel selectie';
  shareBtn.addEventListener('click', function() { Store.shareURL(); });
  btnRow.appendChild(shareBtn);

  costPanel.appendChild(btnRow);
  dashGrid.appendChild(costPanel);
  page.appendChild(dashGrid);
  app.appendChild(page);

  // === SUBSCRIBE FOR LIVE UPDATES ===
  var unsub = function(state) {
    if (!document.contains(page)) return;
    var t = Store.getTotals();

    // Update category bars
    Object.keys(CAT_TARGETS).forEach(function(cat) {
      var target = CAT_TARGETS[cat];
      var current = t.perCategory[cat] || 0;
      var pct = target > 0 ? Math.min(100, Math.round((current / target) * 100)) : (current > 0 ? 100 : 0);
      var targetPct = target > 0 ? Math.min(100, Math.round((target / Math.max(target, current)) * 100)) : 100;
      if (catRefs[cat]) {
        catRefs[cat].nums.textContent = current + '/' + target;
        catRefs[cat].fill.style.width = pct + '%';
        catRefs[cat].targetLine.style.left = targetPct + '%';
      }
    });

    // Update spectrum + height
    buildDashSpectrum();
    buildHeightChart();
    buildProfile();

    // Update light
    var ld = computeLight();
    lightTypes.forEach(function(lt) {
      var p = ld.total > 0 ? Math.round((ld.counts[lt.key] / ld.total) * 100) : 0;
      lightRefs[lt.key].fill.style.width = p + '%';
      lightRefs[lt.key].pct.textContent = p + '%';
    });

    // Update costs
    nrCell.amtEl.textContent = '\u20AC' + t.perSupplier.NR.cost.toFixed(2).replace('.', ',');
    nrCell.cntEl.textContent = t.perSupplier.NR.qty + ' planten';
    vaCell.amtEl.textContent = '\u20AC' + t.perSupplier.VA.cost.toFixed(2).replace('.', ',');
    vaCell.cntEl.textContent = t.perSupplier.VA.qty + ' planten';
    totalCell.amtEl.textContent = '\u20AC' + t.totalCost.toFixed(2).replace('.', ',');
    totalCell.cntEl.textContent = t.totalQty + ' planten';
  };
  Store.subscribe(unsub);
}

function renderCatalog(app, params) {
  var page = document.createElement('div');
  page.className = 'page';

  var title = document.createElement('h1');
  title.className = 'page-title';
  var em = document.createElement('em');
  em.textContent = 'Catalogus';
  title.appendChild(em);
  page.appendChild(title);

  // === STATE ===
  var filters = {
    search: params.search || '',
    zon: false,
    hs: false,
    schaduw: false,
    alleenBorder: false,
    mijnLijst: false,
    suggestie: false,
    shade: false,
    kleur: params.kleur || '',
    category: params.category || ''
  };

  // === SPECTRUM BAR ===
  var specPanel = document.createElement('div');
  specPanel.className = 'panel';
  specPanel.style.cssText = 'margin-bottom:20px;padding:16px 20px';
  var specRow = document.createElement('div');
  specRow.style.cssText = 'display:flex;align-items:center;gap:16px';
  var specLabel = document.createElement('span');
  specLabel.className = 'panel-label';
  specLabel.style.cssText = 'margin-bottom:0;white-space:nowrap';
  specLabel.textContent = 'Kleurenspectrum';
  specRow.appendChild(specLabel);

  var spectrumBar = document.createElement('div');
  spectrumBar.className = 'spectrum';
  spectrumBar.style.flex = '1';

  var colorOrder = ['wit','wit-roze','roze','rozepaars','lila','paars','blauw','groen','geel','oranje','oranje-rood','rood','zwart-bruin','beige','gemengd'];

  function buildCatSpectrum() {
    spectrumBar.textContent = '';
    var selected = Store.getSelected();
    var colorCounts = {};
    selected.forEach(function(item) {
      var k = item.plant.kleur;
      if (!k) return;
      colorCounts[k] = (colorCounts[k] || 0) + (item.selection.qty || 1);
    });
    var total = 0;
    Object.keys(colorCounts).forEach(function(c) { total += colorCounts[c]; });

    colorOrder.forEach(function(c) {
      if (!colorCounts[c]) return;
      var pct = total > 0 ? Math.max(2, Math.round((colorCounts[c] / total) * 100)) : 0;
      var seg = document.createElement('div');
      seg.className = 'spectrum-seg';
      seg.style.width = pct + '%';
      seg.style.cursor = 'pointer';
      var css = COLOR_CSS[c] || '#999';
      if (css === 'rainbow') {
        seg.style.background = 'linear-gradient(90deg, #e91e8c, #fdd835, #1976d2, #4caf50)';
      } else {
        seg.style.background = css;
      }
      if (filters.kleur === c) {
        seg.style.outline = '2px solid var(--ink)';
        seg.style.outlineOffset = '2px';
        seg.style.borderRadius = '4px';
      }
      seg.setAttribute('data-kleur', c);
      seg.addEventListener('click', function() {
        filters.kleur = filters.kleur === c ? '' : c;
        buildCatSpectrum();
        renderCards();
      });
      spectrumBar.appendChild(seg);
    });

    if (total === 0) {
      var emptySeg = document.createElement('div');
      emptySeg.className = 'spectrum-seg';
      emptySeg.style.width = '100%';
      emptySeg.style.background = 'var(--ink-10)';
      spectrumBar.appendChild(emptySeg);
    }
  }

  buildCatSpectrum();
  specRow.appendChild(spectrumBar);
  specPanel.appendChild(specRow);
  page.appendChild(specPanel);

  // === FILTER BAR ===
  var filterBar = document.createElement('div');
  filterBar.className = 'filter-bar';

  var searchInput = document.createElement('input');
  searchInput.type = 'text';
  searchInput.className = 'filter-search';
  searchInput.placeholder = 'Zoek op naam of variant...';
  searchInput.value = filters.search;
  searchInput.addEventListener('input', function() {
    filters.search = searchInput.value.toLowerCase();
    renderCards();
  });
  filterBar.appendChild(searchInput);

  function makeFilterBtn(label, filterKey) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn';
    if (filters[filterKey]) btn.classList.add('active');
    btn.textContent = label;
    btn.addEventListener('click', function() {
      filters[filterKey] = !filters[filterKey];
      btn.classList.toggle('active', filters[filterKey]);
      renderCards();
    });
    return btn;
  }

  filterBar.appendChild(makeFilterBtn('\u2600 Zon', 'zon'));
  filterBar.appendChild(makeFilterBtn('\u26C5 Halfsch.', 'hs'));
  filterBar.appendChild(makeFilterBtn('\u263E Schaduw', 'schaduw'));
  filterBar.appendChild(makeFilterBtn('\u2665 Alleen border', 'alleenBorder'));

  var sep = document.createElement('span');
  sep.style.cssText = 'width:1px;height:20px;background:var(--border);flex-shrink:0';
  filterBar.appendChild(sep);

  filterBar.appendChild(makeFilterBtn('Mijn lijst', 'mijnLijst'));
  filterBar.appendChild(makeFilterBtn('Suggestie', 'suggestie'));
  filterBar.appendChild(makeFilterBtn('Schaduw', 'shade'));

  // Category filter dropdown
  if (filters.category) {
    var sep2 = document.createElement('span');
    sep2.style.cssText = 'width:1px;height:20px;background:var(--border);flex-shrink:0';
    filterBar.appendChild(sep2);
  }
  var catFilterSelect = document.createElement('select');
  catFilterSelect.className = 'filter-btn';
  catFilterSelect.style.cssText = 'padding:6px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:500;background:var(--card);cursor:pointer;font-family:var(--font-body)';
  if (filters.category) {
    catFilterSelect.style.background = 'var(--moss)';
    catFilterSelect.style.color = '#fff';
    catFilterSelect.style.borderColor = 'var(--moss)';
  }
  var catDefaultOpt = document.createElement('option');
  catDefaultOpt.value = '';
  catDefaultOpt.textContent = 'Alle categorie\u00EBn';
  catFilterSelect.appendChild(catDefaultOpt);
  Object.keys(CAT_TARGETS).forEach(function(c) {
    var o = document.createElement('option');
    o.value = c;
    o.textContent = c.charAt(0).toUpperCase() + c.slice(1);
    if (c === filters.category) o.selected = true;
    catFilterSelect.appendChild(o);
  });
  catFilterSelect.addEventListener('change', function() {
    filters.category = catFilterSelect.value;
    if (filters.category) {
      catFilterSelect.style.background = 'var(--moss)';
      catFilterSelect.style.color = '#fff';
      catFilterSelect.style.borderColor = 'var(--moss)';
    } else {
      catFilterSelect.style.background = 'var(--card)';
      catFilterSelect.style.color = '';
      catFilterSelect.style.borderColor = 'var(--border)';
    }
    renderCards();
  });
  filterBar.appendChild(catFilterSelect);

  page.appendChild(filterBar);

  // === CARD CONTAINER ===
  var cardContainer = document.createElement('div');
  page.appendChild(cardContainer);

  // === HELPER: group CATALOG by genus ===
  var genusList = [];
  var genusMap = {};
  CATALOG.forEach(function(p) {
    if (!genusMap[p.genus]) {
      genusMap[p.genus] = { genus: p.genus, common: p.common || '', plants: [] };
      genusList.push(genusMap[p.genus]);
    }
    genusMap[p.genus].plants.push(p);
  });

  // === FILTER + RENDER ===
  function filterPlant(p) {
    if (filters.search) {
      var s = filters.search;
      var haystack = (p.genus + ' ' + p.species + ' ' + p.variant + ' ' + (p.common || '')).toLowerCase();
      if (haystack.indexOf(s) === -1) return false;
    }
    if (filters.zon && !p.zon) return false;
    if (filters.hs && !p.hs) return false;
    if (filters.schaduw && !p.schaduw) return false;
    if (filters.alleenBorder && !Store.isSelected(p.id)) return false;
    if (filters.kleur && p.kleur !== filters.kleur) return false;
    if (filters.category) {
      // Check if this plant's selection has the category, OR if the genus typically belongs to this category
      var sel = Store.getSelection(p.id);
      var selCat = sel ? sel.category : '';
      var genusCat = GENUS_CATEGORIES[p.genus] || '';
      if (selCat !== filters.category && genusCat !== filters.category) return false;
    }
    if (filters.mijnLijst) {
      var genusHasBorder = genusMap[p.genus].plants.some(function(gp) { return gp.inBorder; });
      if (!genusHasBorder) return false;
    }
    if (filters.suggestie) {
      var genusHasBorder2 = genusMap[p.genus].plants.some(function(gp) { return gp.inBorder; });
      if (genusHasBorder2) return false;
    }
    if (filters.shade) {
      if (!p.schaduw && !p.hs) return false;
    }
    return true;
  }

  function getColorGradient(kleur) {
    var css = COLOR_CSS[kleur] || '#999';
    if (css === 'rainbow') return 'linear-gradient(145deg, #e91e8c, #fdd835, #1976d2)';
    return 'linear-gradient(145deg, ' + css + ', ' + css + 'cc, ' + css + '88)';
  }

  function buildPlantCard(p) {
    var sel = Store.isSelected(p.id);
    var selection = sel ? Store.getSelection(p.id) : null;
    var hasSupply = p.va || p.nr;

    var card = document.createElement('div');
    card.className = 'plant-card';
    card.setAttribute('data-plant-id', p.id);
    if (sel) card.classList.add('selected');
    if (sel && !hasSupply) card.classList.add('unavailable');

    // Badge or add button
    if (sel) {
      var badge = document.createElement('span');
      badge.className = 'card-badge';
      if (hasSupply) {
        badge.classList.add('in-border');
      } else {
        badge.classList.add('unavailable');
      }
      badge.textContent = 'In border';
      card.appendChild(badge);
    } else {
      var addBtn = document.createElement('span');
      addBtn.className = 'card-add';
      addBtn.textContent = '+';
      addBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        Store.togglePlant(p.id);
      });
      card.appendChild(addBtn);
    }

    // Image area
    var imgWrap = document.createElement('div');
    imgWrap.className = 'card-img';

    if (p.images && p.images.length > 0) {
      var currentIdx = 0;
      var imgEl = document.createElement('img');
      imgEl.className = 'card-img-gradient';
      imgEl.style.objectFit = 'cover';
      imgEl.src = p.images[0];
      imgEl.alt = p.species + (p.variant ? ' ' + p.variant : '');
      imgEl.addEventListener('error', function() {
        imgEl.style.display = 'none';
        var grad = document.createElement('div');
        grad.className = 'card-img-gradient';
        grad.style.background = getColorGradient(p.kleur);
        imgWrap.insertBefore(grad, imgEl);
      });
      imgEl.style.cursor = 'pointer';
      imgEl.addEventListener('click', function() {
        var q = encodeURIComponent(p.species + (p.variant ? ' ' + p.variant : ''));
        window.open('https://www.google.com/search?tbm=isch&q=' + q, '_blank');
      });
      imgWrap.appendChild(imgEl);

      // Carousel for multiple images
      if (p.images.length > 1) {
        var dotsRow = document.createElement('div');
        dotsRow.style.cssText = 'position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:6';
        var dots = [];
        p.images.forEach(function(_, i) {
          var dot = document.createElement('span');
          dot.style.cssText = 'width:6px;height:6px;border-radius:50%;background:' + (i === 0 ? '#fff' : 'rgba(255,255,255,0.5)') + ';cursor:pointer;transition:background 0.2s';
          dot.addEventListener('click', function(e) {
            e.stopPropagation();
            currentIdx = i;
            imgEl.src = p.images[i];
            dots.forEach(function(d, j) {
              d.style.background = j === i ? '#fff' : 'rgba(255,255,255,0.5)';
            });
          });
          dots.push(dot);
          dotsRow.appendChild(dot);
        });
        imgWrap.appendChild(dotsRow);

        // Arrows
        var arrowLeft = document.createElement('span');
        arrowLeft.style.cssText = 'position:absolute;top:50%;left:6px;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,0.35);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:6';
        arrowLeft.textContent = '\u2039';
        arrowLeft.addEventListener('click', function(e) {
          e.stopPropagation();
          currentIdx = (currentIdx - 1 + p.images.length) % p.images.length;
          imgEl.src = p.images[currentIdx];
          dots.forEach(function(d, j) {
            d.style.background = j === currentIdx ? '#fff' : 'rgba(255,255,255,0.5)';
          });
        });
        imgWrap.appendChild(arrowLeft);

        var arrowRight = document.createElement('span');
        arrowRight.style.cssText = 'position:absolute;top:50%;right:6px;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,0.35);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:6';
        arrowRight.textContent = '\u203A';
        arrowRight.addEventListener('click', function(e) {
          e.stopPropagation();
          currentIdx = (currentIdx + 1) % p.images.length;
          imgEl.src = p.images[currentIdx];
          dots.forEach(function(d, j) {
            d.style.background = j === currentIdx ? '#fff' : 'rgba(255,255,255,0.5)';
          });
        });
        imgWrap.appendChild(arrowRight);
      }
    } else {
      var grad = document.createElement('div');
      grad.className = 'card-img-gradient';
      grad.style.background = getColorGradient(p.kleur);
      imgWrap.appendChild(grad);
    }
    card.appendChild(imgWrap);

    // Body
    var body = document.createElement('div');
    body.className = 'card-body';

    var species = document.createElement('div');
    species.className = 'card-species';
    species.textContent = p.species;
    body.appendChild(species);

    if (p.variant) {
      var variant = document.createElement('div');
      variant.className = 'card-variant';
      variant.textContent = '\u2018' + p.variant + '\u2019';
      body.appendChild(variant);
    }

    // Meta pills
    var meta = document.createElement('div');
    meta.className = 'card-meta';

    var colorPill = document.createElement('span');
    colorPill.className = 'meta-pill';
    var colorDot = document.createElement('span');
    colorDot.className = 'meta-dot';
    var colorCss = COLOR_CSS[p.kleur] || '#999';
    if (colorCss === 'rainbow') {
      colorDot.style.background = 'linear-gradient(135deg, #e91e8c, #fdd835)';
    } else {
      colorDot.style.background = colorCss;
    }
    colorPill.appendChild(colorDot);
    colorPill.appendChild(document.createTextNode(p.kleur));
    meta.appendChild(colorPill);

    if (p.hoogte) {
      var heightPill = document.createElement('span');
      heightPill.className = 'meta-pill';
      heightPill.textContent = '\u2195 ' + p.hoogte + 'cm';
      meta.appendChild(heightPill);
    }

    // Sun icons
    var lightParts = [];
    if (p.zon) lightParts.push('\u2600 zon');
    if (p.hs) lightParts.push('\u26C5 hs');
    if (p.schaduw) lightParts.push('\u263E schaduw');
    if (lightParts.length > 0) {
      var lightPill = document.createElement('span');
      lightPill.className = 'meta-pill';
      lightPill.style.color = 'var(--copper)';
      lightPill.textContent = lightParts.join(' ');
      meta.appendChild(lightPill);
    }

    body.appendChild(meta);

    // Footer with both suppliers
    var footer = document.createElement('div');
    footer.className = 'card-footer';

    var nrPrice = p.nr && p.code ? (NR_PRICES[p.code] || 0) : 0;
    var vaPrice = p.va && p.vaPrice ? p.vaPrice : 0;
    var cheapest = '';
    if (nrPrice > 0 && vaPrice > 0) {
      cheapest = vaPrice <= nrPrice ? 'VA' : 'NR';
    } else if (nrPrice > 0) {
      cheapest = 'NR';
    } else if (vaPrice > 0) {
      cheapest = 'VA';
    }

    // NR row
    var nrRow = document.createElement('div');
    nrRow.className = 'supplier-row';
    if (!p.nr) nrRow.classList.add('unavailable');
    var nrName = document.createElement('span');
    nrName.className = 'supplier-name';
    nrName.textContent = 'NR';
    if (p.code && p.nr) {
      var codeSpan = document.createElement('span');
      codeSpan.className = 'code';
      codeSpan.textContent = ' \u00B7 ' + p.code;
      nrName.appendChild(codeSpan);
    }
    nrRow.appendChild(nrName);
    var nrPriceSpan = document.createElement('span');
    nrPriceSpan.className = 'supplier-price';
    if (p.nr && nrPrice > 0) {
      if (cheapest === 'NR') nrPriceSpan.classList.add('cheapest');
      nrPriceSpan.textContent = '\u20AC' + nrPrice.toFixed(2).replace('.', ',');
    } else {
      nrPriceSpan.textContent = '\u2014';
    }
    nrRow.appendChild(nrPriceSpan);
    footer.appendChild(nrRow);

    // VA row
    var vaRow = document.createElement('div');
    vaRow.className = 'supplier-row';
    if (!p.va) vaRow.classList.add('unavailable');
    var vaName = document.createElement('span');
    vaName.className = 'supplier-name';
    vaName.textContent = 'VA';
    vaRow.appendChild(vaName);
    var vaPriceSpan = document.createElement('span');
    vaPriceSpan.className = 'supplier-price';
    if (p.va && vaPrice > 0) {
      if (cheapest === 'VA') vaPriceSpan.classList.add('cheapest');
      vaPriceSpan.textContent = '\u20AC' + vaPrice.toFixed(2).replace('.', ',');
    } else {
      vaPriceSpan.textContent = '\u2014';
    }
    vaRow.appendChild(vaPriceSpan);
    footer.appendChild(vaRow);
    body.appendChild(footer);

    // Qty stepper for selected plants
    if (sel && selection) {
      var stepper = document.createElement('div');
      stepper.className = 'qty-stepper';

      var minusBtn = document.createElement('button');
      minusBtn.className = 'qty-btn';
      minusBtn.textContent = '\u2212';
      var qtyVal = document.createElement('span');
      qtyVal.className = 'qty-val';
      qtyVal.textContent = selection.qty;
      var plusBtn = document.createElement('button');
      plusBtn.className = 'qty-btn';
      plusBtn.textContent = '+';

      minusBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var cur = Store.getSelection(p.id);
        if (!cur) return;
        var newQty = cur.qty - 1;
        if (newQty <= 0) {
          Store.togglePlant(p.id);
        } else {
          Store.setQty(p.id, newQty);
        }
      });
      plusBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var cur = Store.getSelection(p.id);
        if (!cur) return;
        var newQty = cur.qty + 1;
        Store.setQty(p.id, newQty);
      });

      stepper.appendChild(minusBtn);
      stepper.appendChild(qtyVal);
      stepper.appendChild(plusBtn);
      body.appendChild(stepper);
    }

    card.appendChild(body);
    return card;
  }

  function renderCards() {
    cardContainer.textContent = '';

    genusList.forEach(function(g) {
      var filtered = g.plants.filter(filterPlant);
      if (filtered.length === 0) return;

      // Genus header
      var header = document.createElement('div');
      header.className = 'genus-header';
      header.style.position = 'sticky';
      header.style.top = '56px';
      header.style.background = 'var(--bg)';
      header.style.zIndex = '10';

      var gName = document.createElement('span');
      gName.className = 'genus-name';
      gName.textContent = g.genus;
      header.appendChild(gName);

      if (g.common) {
        var gCommon = document.createElement('span');
        gCommon.className = 'genus-common';
        gCommon.textContent = g.common;
        header.appendChild(gCommon);
      }

      // Tag: mijn lijst or suggestie
      var genusHasBorder = g.plants.some(function(p) { return p.inBorder; });
      var tag = document.createElement('span');
      tag.className = 'genus-tag';
      if (genusHasBorder) {
        tag.classList.add('my-list');
        tag.textContent = 'Mijn lijst';
      } else {
        tag.classList.add('suggested');
        tag.textContent = 'Suggestie';
      }
      header.appendChild(tag);

      var gCount = document.createElement('span');
      gCount.className = 'genus-count';
      gCount.textContent = filtered.length + ' var.';
      header.appendChild(gCount);

      cardContainer.appendChild(header);

      // Card grid
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      grid.style.marginBottom = '32px';

      filtered.forEach(function(p) {
        grid.appendChild(buildPlantCard(p));
      });

      cardContainer.appendChild(grid);
    });
  }

  renderCards();
  app.appendChild(page);

  // Subscribe for reactivity — only update spectrum + individual cards, not full re-render
  Store.subscribe(function() {
    if (!document.contains(page)) return;
    buildCatSpectrum();
    // Update card states in-place instead of full re-render
    var cards = page.querySelectorAll('[data-plant-id]');
    cards.forEach(function(card) {
      var pid = card.getAttribute('data-plant-id');
      var selected = Store.isSelected(pid);
      card.classList.toggle('selected', selected);
      // Update badge
      var oldBadge = card.querySelector('.card-badge, .card-add');
      if (oldBadge) oldBadge.remove();
      if (selected) {
        var p = CATALOG_BY_ID[pid];
        var avail = (p && (p.va || p.nr));
        var badge = document.createElement('span');
        badge.className = 'card-badge ' + (avail ? 'in-border' : 'unavailable');
        badge.textContent = 'In border';
        card.insertBefore(badge, card.firstChild);
      } else {
        var addBtn = document.createElement('span');
        addBtn.className = 'card-add';
        addBtn.textContent = '+';
        addBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          Store.togglePlant(pid);
        });
        card.insertBefore(addBtn, card.firstChild);
      }
      // Update stepper visibility
      var stepper = card.querySelector('.qty-stepper');
      if (selected && !stepper) {
        var sel = Store.getSelection(pid);
        var st = document.createElement('div');
        st.className = 'qty-stepper';
        var minus = document.createElement('button'); minus.className = 'qty-btn'; minus.textContent = '\u2212';
        var val = document.createElement('span'); val.className = 'qty-val'; val.textContent = sel ? sel.qty : 1;
        var plus = document.createElement('button'); plus.className = 'qty-btn'; plus.textContent = '+';
        minus.addEventListener('click', function(e) { e.stopPropagation(); var s = Store.getSelection(pid); if (s && s.qty > 1) Store.setQty(pid, s.qty - 1); else Store.togglePlant(pid); });
        plus.addEventListener('click', function(e) { e.stopPropagation(); var s = Store.getSelection(pid); Store.setQty(pid, (s ? s.qty : 0) + 1); });
        st.appendChild(minus); st.appendChild(val); st.appendChild(plus);
        var body = card.querySelector('.card-body');
        if (body) body.appendChild(st);
      } else if (!selected && stepper) {
        stepper.remove();
      } else if (selected && stepper) {
        // Only update display text, don't recreate
        var sel = Store.getSelection(pid);
        var valEl = stepper.querySelector('.qty-val');
        if (valEl && sel) valEl.textContent = sel.qty;
      }
      // Also update existing stepper in card-body (for catalog cards with initial steppers)
      var existingVal = card.querySelector('.card-body .qty-val');
      if (existingVal && selected) {
        var s = Store.getSelection(pid);
        if (s) existingVal.textContent = s.qty;
      }
    });
  });
}

// views-phase1bc.js — Mijn Border, Bestelling, Genera Gids
// Depends on: CATALOG, CATALOG_BY_ID, Store, Router, NR_PRICES, CAT_TARGETS, COLOR_CSS (from app.html)

function el(tag, className, text) {
  var e = document.createElement(tag);
  if (className) e.className = className;
  if (text !== undefined && text !== null) e.textContent = text;
  return e;
}

function formatEuro(n) {
  return '\u20AC' + n.toFixed(2).replace('.', ',');
}

function getPrice(plant, supplier) {
  if (supplier === 'NR' && plant.code) return NR_PRICES[plant.code] || 0;
  if (supplier === 'VA' && plant.vaPrice) return plant.vaPrice;
  return 0;
}

function getThumbColor(plant) {
  return COLOR_CSS[plant.kleur] || '#ccc';
}

function makePageTitle(parts) {
  // parts: array of { text, em } objects — em:true wraps in <em>
  var h1 = el('h1', 'page-title');
  parts.forEach(function(part) {
    if (part.em) {
      var emEl = document.createElement('em');
      emEl.textContent = part.text;
      h1.appendChild(emEl);
    } else {
      h1.appendChild(document.createTextNode(part.text));
    }
  });
  return h1;
}

function makeThumbnail(plant) {
  var thumb = el('div', 'row-thumb');
  if (plant.images && plant.images.length) {
    var img = el('img', 'row-thumb-img');
    img.src = plant.images[0];
    img.alt = plant.species;
    img.loading = 'lazy';
    img.onerror = function() {
      this.style.display = 'none';
      var grad = el('div', 'row-thumb-gradient');
      grad.style.background = getThumbColor(plant);
      thumb.appendChild(grad);
    };
    thumb.appendChild(img);
  } else {
    var grad = el('div', 'row-thumb-gradient');
    grad.style.background = getThumbColor(plant);
    thumb.appendChild(grad);
  }
  return thumb;
}

function makeStatusIcon(status) {
  if (status === 'must-have') return '\u2726';
  if (status === 'variant-flex') return '\u25C7';
  return '\u25CB';
}

// ════════════════════════════════════════════════════════
