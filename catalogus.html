<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Border Catalogus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --parchment: #f4f0e8;
  --parchment-dark: #e8e2d6;
  --ink: #2a2520;
  --ink-light: #5c554d;
  --ink-faint: #9e968c;
  --moss: #4a5a3c;
  --moss-light: #6b7d5a;
  --copper: #b87333;
  --border-card: #d6cfc4;
  --shadow: rgba(42, 37, 32, 0.08);
  --selected-glow: rgba(74, 90, 60, 0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scrollbar-width: none; }
html::-webkit-scrollbar { display: none; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--parchment);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.app { max-width: 1400px; margin: 0 auto; padding: 0 24px 80px; }

.hero { padding: 48px 0 32px; border-bottom: 1px solid var(--border-card); margin-bottom: 32px; position: relative; }
.hero::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 120px; height: 3px; background: var(--moss); }
.hero-eyebrow { font-weight: 500; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--moss); margin-bottom: 12px; }
.hero h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(36px, 6vw, 64px); line-height: 1.05; letter-spacing: -0.02em; }
.hero h1 em { font-style: italic; color: var(--moss); }
.hero-meta { margin-top: 16px; display: flex; gap: 24px; color: var(--ink-faint); font-size: 13px; }
.hero-meta span { display: flex; align-items: center; gap: 6px; }
.hero-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--moss-light); }

.filters { position: sticky; top: 0; z-index: 100; background: var(--parchment); padding: 16px 0; margin-bottom: 8px; border-bottom: 1px solid var(--border-card); }
.filters-inner { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--ink-faint); }
.search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid var(--border-card); border-radius: 8px; background: var(--parchment); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); transition: border-color 0.2s, box-shadow 0.2s; }
.search-input::placeholder { color: var(--ink-faint); }
.search-input:focus { outline: none; border-color: var(--moss); box-shadow: 0 0 0 3px var(--selected-glow); }
.filter-btn { padding: 9px 16px; border: 1px solid var(--border-card); border-radius: 8px; background: var(--parchment); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--ink-light); cursor: pointer; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
.filter-btn:hover { border-color: var(--ink-faint); color: var(--ink); }
.filter-btn.active { background: var(--moss); color: #fff; border-color: var(--moss); }
.filter-divider { width: 1px; height: 24px; background: var(--border-card); flex-shrink: 0; }

.genus-section { margin-bottom: 48px; }
.genus-header { position: sticky; top: 60px; z-index: 50; padding: 20px 0 16px; background: var(--parchment); display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border-card); margin-bottom: 24px; }
.genus-name { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-style: italic; font-size: 32px; letter-spacing: -0.01em; }
.genus-common { font-size: 13px; color: var(--ink-faint); }
.genus-count { margin-left: auto; font-size: 12px; color: var(--ink-faint); display: flex; align-items: center; gap: 8px; }
.genus-tag { font-size: 9px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; }
.genus-tag.my-list { background: var(--moss); color: #fff; }
.genus-tag.suggested { background: var(--copper); color: #fff; opacity: 0.85; }

.plant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

.plant-card { background: #fff; border: 1px solid var(--border-card); border-radius: 12px; overflow: hidden; transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s ease; position: relative; animation: cardIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) backwards; }
.plant-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px var(--shadow), 0 4px 12px var(--shadow); }
.plant-card.in-border { border-color: var(--moss); box-shadow: 0 0 0 1px var(--moss), 0 2px 8px var(--selected-glow); }
.plant-card.in-border:hover { box-shadow: 0 0 0 1px var(--moss), 0 12px 32px var(--selected-glow); }

.border-badge { position: absolute; top: 12px; right: 12px; color: #fff; font-size: 9px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; z-index: 5; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
.border-badge.available { background: var(--moss); }
.border-badge.unavailable { background: #999; }

.card-visual { height: 200px; position: relative; overflow: hidden; }
.card-visual-gradient { width: 100%; height: 100%; }
.card-carousel { width: 100%; height: 100%; position: relative; }
.card-carousel img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; opacity: 0; transition: opacity 0.35s ease; }
.card-carousel img.active { opacity: 1; }
.carousel-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 5; }
.carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.45); cursor: pointer; transition: all 0.2s; border: none; padding: 0; }
.carousel-dot.active { background: #fff; transform: scale(1.3); }
.carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.7); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; opacity: 0; transition: opacity 0.2s; font-size: 14px; color: var(--ink); }
.card-visual:hover .carousel-arrow { opacity: 1; }
.carousel-arrow.left { left: 6px; }
.carousel-arrow.right { right: 6px; }
.search-hint { color: rgba(255,255,255,0.6); font-size: 13px; font-family: 'DM Sans', sans-serif; transition: color 0.2s; pointer-events: none; }
.card-visual-gradient:hover .search-hint { color: rgba(255,255,255,0.9); }

.plant-card { display: flex; flex-direction: column; }
.card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
.card-meta { margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-end; }
.card-footer { margin-top: auto; }
.plant-card.unavailable { opacity: 0.5; }
.plant-card.unavailable:hover { opacity: 0.75; }
.supplier-tag { font-size: 10px; font-weight: 500; color: var(--ink-faint); letter-spacing: 0.5px; }

.card-latin { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px; line-height: 1.3; margin-bottom: 2px; }
.card-variant { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.meta-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; background: var(--parchment); color: var(--ink-light); }
.meta-tag .color-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
.meta-tag.sun { color: var(--copper); }
.meta-tag.shade { color: var(--moss); }

.card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--parchment-dark); }
.price-code { font-size: 12px; font-weight: 500; color: var(--ink-faint); background: var(--parchment); padding: 3px 10px; border-radius: 4px; }
.price-value { font-size: 14px; font-weight: 500; }

.no-results { text-align: center; padding: 60px 20px; color: var(--ink-faint); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 20px; }

/* ─── DASHBOARD ─── */
.dashboard { display: grid; grid-template-columns: 1fr 280px; gap: 20px; margin-bottom: 32px; }
.dash-panel { background: #fff; border: 1px solid var(--border-card); border-radius: 12px; padding: 20px; }
.dash-label { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 12px; }
.spectrum-bar { height: 32px; border-radius: 8px; overflow: hidden; display: flex; margin-bottom: 8px; border: 1px solid var(--border-card); }
.spectrum-segment { height: 100%; position: relative; cursor: pointer; transition: opacity 0.2s; min-width: 2px; }
.spectrum-segment:hover { opacity: 0.85; }
.spectrum-segment.faded { opacity: 0.25; }
.spectrum-segment.active { opacity: 1; }
.spectrum-segment .tip { display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 3px 10px; border-radius: 4px; font-size: 11px; white-space: nowrap; z-index: 10; }
.spectrum-segment:hover .tip { display: block; }
.spectrum-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink-light); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }

.light-bars { display: flex; flex-direction: column; gap: 10px; }
.light-row { display: flex; align-items: center; gap: 10px; }
.light-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.light-label { font-size: 12px; color: var(--ink-light); width: 70px; flex-shrink: 0; }
.light-bar-bg { flex: 1; height: 20px; background: var(--parchment); border-radius: 6px; overflow: hidden; border: 1px solid var(--border-card); }
.light-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
.light-bar-fill span { font-size: 10px; font-weight: 500; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
.light-pct { font-size: 12px; font-weight: 500; width: 36px; text-align: right; color: var(--ink-light); }

.suggest-badge { position: absolute; top: 12px; right: 12px; background: var(--copper); color: #fff; font-size: 9px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; z-index: 5; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

@media (max-width: 640px) { .dashboard { grid-template-columns: 1fr; } }

@keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 640px) {
  .app { padding: 0 16px 60px; }
  .hero { padding: 32px 0 24px; }
  .hero h1 { font-size: 32px; }
  .plant-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .card-visual { height: 140px; }
  .card-body { padding: 12px; }
  .card-latin { font-size: 15px; }
  .genus-name { font-size: 24px; }
  .genus-header { top: 56px; }
  .filters-inner { gap: 8px; }
}
</style>
</head>

  <div class="dashboard">
    <div class="dash-panel">
      <div class="dash-label">Kleurenspectrum &mdash; mijn border</div>
      <div class="spectrum-bar" id="spectrumBar"></div>
      <div class="spectrum-legend" id="spectrumLegend"></div>

    <div class="dash-panel">
      <div class="dash-label">Lichtbalans &mdash; mijn border</div>
      <div class="light-bars" id="lightBars"></div>

  </div>
  <div id="catalog"></div>
</div>

var RAINBOW = 'linear-gradient(90deg,#d32f2f,#f57c00,#fdd835,#66bb6a,#1976d2,#7b1fa2)';

function getColor(kleur) {
  var c = COLOR_CSS[kleur];
  return (!c || c === 'rainbow') ? '#999' : c;
}

function getBg(kleur) {
  var c = COLOR_CSS[kleur];
  return c === 'rainbow' ? RAINBOW : (c || '#999');
}

function el(tag, cls, text) {
  var n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text) n.textContent = text;
  return n;
}

function buildCard(p, idx) {
  var c = getColor(p.kleur);
  var price = PRICE_MAP[p.code];

  var card = el('div', 'plant-card' + (p.inBorder ? ' in-border' : ''));
  card.style.animationDelay = (idx * 0.05) + 's';
  card.setAttribute('data-search', (p.species + ' ' + p.variant).toLowerCase());
  card.setAttribute('data-kleur', p.kleur);

  if (p.inBorder) {
    var avail = p.va || p.nr;
    var badge = el('div', 'border-badge ' + (avail ? 'available' : 'unavailable'), avail ? 'In border' : 'Niet beschikbaar');
    card.appendChild(badge);
    if (!avail) card.classList.add('unavailable');
  } else {
    card.appendChild(el('div', 'suggest-badge', 'NR Catalogus'));
  }

  // Visual — carousel if images, clickable gradient fallback
  var vis = el('div', 'card-visual');
  var searchUrl = 'https://www.google.com/search?tbm=isch&q=' + encodeURIComponent((p.species + ' ' + (p.variant || '')).trim() + ' plant flower');

  if (p.images && p.images.length > 0) {
    var carousel = el('div', 'card-carousel');
    carousel.setAttribute('data-idx', '0');
    p.images.forEach(function(url, i) {
      var img = document.createElement('img');
      img.src = url;
      img.alt = (p.species + ' ' + (p.variant || '')).trim();
      img.loading = 'lazy';
      if (i === 0) img.className = 'active';
      img.style.cursor = 'pointer';
      img.addEventListener('click', function() { window.open(searchUrl, '_blank'); });
      img.addEventListener('error', function() {
        // Dead link: replace with color gradient fallback
        this.style.display = 'none';
        // If no other images visible, show gradient
        var siblings = this.parentNode.querySelectorAll('img');
        var anyVisible = false;
        siblings.forEach(function(s) { if (s.style.display !== 'none') anyVisible = true; });
        if (!anyVisible) {
          var fb = document.createElement('div');
          fb.className = 'card-visual-gradient';
          var bg = getBg(p.kleur);
          fb.style.background = bg.indexOf('linear') === 0 ? bg : 'linear-gradient(145deg, ' + c + ' 0%, ' + c + 'cc 40%, ' + c + '88 70%, ' + c + '44 100%)';
          fb.style.cursor = 'pointer';
          fb.style.width = '100%';
          fb.style.height = '100%';
          fb.style.position = 'absolute';
          fb.style.inset = '0';
          fb.addEventListener('click', function() { window.open(searchUrl, '_blank'); });
          this.parentNode.appendChild(fb);
          // Hide dots/arrows
          var dots = this.parentNode.querySelector('.carousel-dots');
          var arrows = this.parentNode.querySelectorAll('.carousel-arrow');
          if (dots) dots.style.display = 'none';
          arrows.forEach(function(a) { a.style.display = 'none'; });
        } else {
          // Show next valid image
          var next = null;
          siblings.forEach(function(s) { if (s.style.display !== 'none' && !next) next = s; });
          if (next) { next.classList.add('active'); }
        }
      });
      carousel.appendChild(img);
    });
    if (p.images.length > 1) {
      var dots = el('div', 'carousel-dots');
      p.images.forEach(function(_, i) {
        var d = el('button', 'carousel-dot' + (i === 0 ? ' active' : ''));
        (function(ci, car) {
          d.addEventListener('click', function(e) {
            e.stopPropagation();
            goSlide(car, ci);
          });
        })(i, carousel);
        dots.appendChild(d);
      });
      carousel.appendChild(dots);
      var arrL = el('button', 'carousel-arrow left', '\u2039');
      var arrR = el('button', 'carousel-arrow right', '\u203A');
      (function(car) {
        arrL.addEventListener('click', function(e) { e.stopPropagation(); stepSlide(car, -1); });
        arrR.addEventListener('click', function(e) { e.stopPropagation(); stepSlide(car, 1); });
      })(carousel);
      carousel.appendChild(arrL);
      carousel.appendChild(arrR);
    }
    vis.appendChild(carousel);
  } else {
    var grad = el('div', 'card-visual-gradient');
    var bg = getBg(p.kleur);
    if (bg.indexOf('linear') === 0) {
      grad.style.background = bg;
    } else {
      grad.style.background = 'linear-gradient(145deg, ' + c + ' 0%, ' + c + 'cc 40%, ' + c + '88 70%, ' + c + '44 100%)';
    }
    grad.style.cursor = 'pointer';
    grad.style.display = 'flex';
    grad.style.alignItems = 'center';
    grad.style.justifyContent = 'center';
    var searchIcon = el('div', 'search-hint', '\uD83D\uDD0D Bekijk foto\'s');
    grad.appendChild(searchIcon);
    grad.addEventListener('click', function() { window.open(searchUrl, '_blank'); });
    vis.appendChild(grad);
  }
  card.appendChild(vis);

  // Body
  var body = el('div', 'card-body');
  body.appendChild(el('div', 'card-latin', p.species));
  if (p.variant) body.appendChild(el('div', 'card-variant', "'" + p.variant + "'"));

  var meta = el('div', 'card-meta');

  var colorTag = el('span', 'meta-tag');
  var dot = el('span', 'color-dot');
  dot.style.background = getBg(p.kleur);
  colorTag.appendChild(dot);
  colorTag.appendChild(document.createTextNode(p.kleur));
  meta.appendChild(colorTag);

  meta.appendChild(el('span', 'meta-tag', '\u2195 ' + p.hoogte + 'cm'));

  if (p.zon) meta.appendChild(el('span', 'meta-tag sun', '\u2600 Zon'));
  if (p.hs) meta.appendChild(el('span', 'meta-tag', '\u26C5 Halfsch.'));
  if (p.schaduw) meta.appendChild(el('span', 'meta-tag shade', '\u263E Schaduw'));

  body.appendChild(meta);

  var footer = el('div', 'card-footer');
  // Show cheapest available: NR price from code, VA price from vaPrice field
  var nrPrice = (p.nr && price) ? price : null;
  var vaPrice = (p.va && p.vaPrice) ? p.vaPrice : null;
  var bestSupplier = '';
  var bestCode = '';
  var bestPrice = null;

  if (vaPrice && nrPrice) {
    if (vaPrice <= nrPrice) { bestSupplier = 'Van Asselberghs'; bestPrice = vaPrice; }
    else { bestSupplier = 'Natu-Ral'; bestCode = p.code; bestPrice = nrPrice; }
  } else if (nrPrice) {
    bestSupplier = 'Natu-Ral'; bestCode = p.code; bestPrice = nrPrice;
  } else if (vaPrice) {
    bestSupplier = 'Van Asselberghs'; bestPrice = vaPrice;
  }

  var label = bestSupplier || '\u2014';
  if (bestCode) label += ' \u00B7 ' + bestCode;
  footer.appendChild(el('span', 'supplier-tag', label));
  footer.appendChild(el('span', 'price-value', bestPrice ? ('\u20ac' + bestPrice.toFixed(2)) : '\u2014'));
  body.appendChild(footer);

  card.appendChild(body);
  return card;
}

var filters = { search: '', border: false, sun: false, halfshade: false, shade: false, kleur: null };

function render() {
  var catalog = document.getElementById('catalog');
  catalog.textContent = '';

  var genera = {};
  PLANTS.forEach(function(p) {
    if (!genera[p.genus]) genera[p.genus] = { common: p.common, plants: [] };
    genera[p.genus].plants.push(p);
  });

  var total = 0;

  Object.keys(genera).sort().forEach(function(genus) {
    var group = genera[genus];
    var visible = group.plants.filter(function(p) {
      var name = (p.species + ' ' + p.variant).toLowerCase();
      if (filters.search && name.indexOf(filters.search) === -1) return false;
      if (filters.border && !p.inBorder) return false;
      if (filters.sun && !p.zon) return false;
      if (filters.halfshade && !p.hs) return false;
      if (filters.shade && !p.schaduw) return false;
      if (filters.kleur && p.kleur !== filters.kleur) return false;
      return true;
    });

    if (visible.length === 0) return;
    total += visible.length;

    var section = el('div', 'genus-section');

    var header = el('div', 'genus-header');
    header.appendChild(el('span', 'genus-name', genus));
    header.appendChild(el('span', 'genus-common', group.common || ''));
    var countWrap = el('span', 'genus-count');
    var hasAnyBorder = group.plants.some(function(p) { return p.inBorder; });
    countWrap.appendChild(el('span', 'genus-tag ' + (hasAnyBorder ? 'my-list' : 'suggested'), hasAnyBorder ? 'Mijn lijst' : 'Suggestie'));
    countWrap.appendChild(document.createTextNode(visible.length + ' var.'));
    header.appendChild(countWrap);
    section.appendChild(header);

    var grid = el('div', 'plant-grid');
    visible.forEach(function(p, i) { grid.appendChild(buildCard(p, i)); });
    section.appendChild(grid);

    catalog.appendChild(section);
  });

  if (total === 0) {
    catalog.appendChild(el('div', 'no-results', 'Geen planten gevonden'));
  }

  renderDashboard();
}

function goSlide(carousel, idx) {
  var imgs = carousel.querySelectorAll('img');
  var dots = carousel.querySelectorAll('.carousel-dot');
  imgs.forEach(function(img) { img.classList.remove('active'); });
  dots.forEach(function(d) { d.classList.remove('active'); });
  imgs[idx].classList.add('active');
  if (dots[idx]) dots[idx].classList.add('active');
  carousel.setAttribute('data-idx', idx);
}

function stepSlide(carousel, dir) {
  var imgs = carousel.querySelectorAll('img');
  var cur = parseInt(carousel.getAttribute('data-idx') || '0');
  var next = (cur + dir + imgs.length) % imgs.length;
  goSlide(carousel, next);
}

function renderDashboard() {
  // Only count border plants that are actually available at a supplier
  var borderPlants = PLANTS.filter(function(p) { return p.inBorder && (p.va || p.nr); });

  // ── Color spectrum ──
  var colorCounts = {};
  borderPlants.forEach(function(p) {
    colorCounts[p.kleur] = (colorCounts[p.kleur] || 0) + 1;
  });
  var colorTotal = borderPlants.length;
  // Sort colors by hue (spectrum order) instead of count
  var HUE_ORDER = {
    'wit':0,'wit-roze':10,'roze':20,'rozepaars':30,'lila':40,'paars':50,
    'blauw':60,'groen':70,'geel':80,'oranje':88,'oranje-rood':92,
    'rood':96,'zwart-bruin':100,'beige':105,'gemengd':999
  };
  var sortedColors = Object.keys(colorCounts).sort(function(a, b) {
    return (HUE_ORDER[a] || 50) - (HUE_ORDER[b] || 50);
  });

  var bar = document.getElementById('spectrumBar');
  var legend = document.getElementById('spectrumLegend');
  bar.textContent = '';
  legend.textContent = '';

  sortedColors.forEach(function(kleur) {
    var cnt = colorCounts[kleur];
    var pct = (cnt / colorTotal) * 100;
    var seg = el('div', 'spectrum-segment');
    seg.style.width = pct + '%';
    seg.style.background = getBg(kleur);
    seg.setAttribute('data-kleur', kleur);
    if (filters.kleur && filters.kleur !== kleur) seg.classList.add('faded');
    if (filters.kleur === kleur) seg.classList.add('active');
    var tip = el('span', 'tip', kleur + ': ' + cnt + ' (' + Math.round(pct) + '%)');
    seg.appendChild(tip);
    (function(k) {
      seg.addEventListener('click', function() {
        filters.kleur = filters.kleur === k ? null : k;
        applyColorFilter();
      });
    })(kleur);
    bar.appendChild(seg);

    var item = el('span', 'legend-item');
    var dot = el('span', 'legend-dot');
    dot.style.background = getBg(kleur);
    item.appendChild(dot);
    item.appendChild(document.createTextNode(kleur + ' (' + cnt + ')'));
    legend.appendChild(item);
  });

  // ── Light balance ──
  var lightCounts = { zon: 0, hs: 0, schaduw: 0 };
  borderPlants.forEach(function(p) {
    if (p.zon) lightCounts.zon++;
    if (p.hs) lightCounts.hs++;
    if (p.schaduw) lightCounts.schaduw++;
  });
  var lightTotal = lightCounts.zon + lightCounts.hs + lightCounts.schaduw || 1;

  var lightEl = document.getElementById('lightBars');
  lightEl.textContent = '';

  var lightData = [
    { key: 'zon', icon: '\u2600', label: 'Zon', count: lightCounts.zon, color: '#d4956a' },
    { key: 'hs', icon: '\u26C5', label: 'Halfschaduw', count: lightCounts.hs, color: '#8da67b' },
    { key: 'schaduw', icon: '\u263E', label: 'Schaduw', count: lightCounts.schaduw, color: '#6b7d5a' },
  ];

  lightData.forEach(function(d) {
    var pct = Math.round((d.count / lightTotal) * 100);
    var row = el('div', 'light-row');
    row.appendChild(el('span', 'light-icon', d.icon));
    row.appendChild(el('span', 'light-label', d.label));

    var bg = el('div', 'light-bar-bg');
    var fill = el('div', 'light-bar-fill');
    fill.style.width = pct + '%';
    fill.style.background = d.color;
    var num = el('span', '', String(d.count));
    fill.appendChild(num);
    bg.appendChild(fill);
    row.appendChild(bg);

    row.appendChild(el('span', 'light-pct', pct + '%'));
    lightEl.appendChild(row);
  });
}

function applyColorFilter() {
  // Update spectrum segment styles
  document.querySelectorAll('.spectrum-segment').forEach(function(seg) {
    var k = seg.getAttribute('data-kleur');
    seg.classList.remove('faded', 'active');
    if (filters.kleur && filters.kleur !== k) seg.classList.add('faded');
    if (filters.kleur === k) seg.classList.add('active');
  });
  // Hide non-matching cards
  document.querySelectorAll('.plant-card').forEach(function(card) {
    var kleur = card.getAttribute('data-kleur');
    card.style.display = (!filters.kleur || kleur === filters.kleur) ? '' : 'none';
  });
  // Also hide empty genus sections
  document.querySelectorAll('.genus-section').forEach(function(sec) {
    var visible = sec.querySelectorAll('.plant-card[style=""], .plant-card:not([style])');
    var hasVisible = false;
    sec.querySelectorAll('.plant-card').forEach(function(c) { if (c.style.display !== 'none') hasVisible = true; });
    sec.style.display = hasVisible ? '' : 'none';
  });
}

document.getElementById('searchInput').addEventListener('input', function() {
  filters.search = this.value.toLowerCase();
  render();
});

['border','sun','halfshade','shade'].forEach(function(key) {
  var id = key === 'border' ? 'btnBorder' : key === 'sun' ? 'btnSun' : key === 'halfshade' ? 'btnHalf' : 'btnShade';
  document.getElementById(id).addEventListener('click', function() {
    filters[key] = !filters[key];
    this.classList.toggle('active', filters[key]);
    render();
  });
});

render();
</script>
</body>
</html>
